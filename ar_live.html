<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR 탭 — 구글 시트 연동</title>
<style>
  :root{
    --bg:#f5f4f0;--surface:#fff;--surface-1:#f1efe8;
    --border:#e2e0d8;--text:#1f1e1c;--text-secondary:#5f5e5a;
    --success:#1D9E75;--success-bg:#E1F5EE;--success-text:#085041;
    --warning:#BA7517;--warning-bg:#FAEEDA;--warning-text:#854F0B;
    --danger:#A32D2D;--danger-bg:#FCEBEB;--danger-text:#791F1F;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:20px;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo",sans-serif;color:var(--text);}
  .wrap{max-width:100%;margin:0 auto;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:20px;}
  h1{font-size:17px;font-weight:500;margin:0 0 4px;}
  .sub{font-size:12px;color:var(--text-secondary);margin:0 0 16px;}
  .status-bar{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;}
  .status-bar.loading{background:var(--surface-1);color:var(--text-secondary);}
  .status-bar.success{background:var(--success-bg);color:var(--success-text);}
  .status-bar.error{background:#FCEBEB;color:#791F1F;}

  .summary{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:16px;}
  .card{background:var(--surface-1);border-radius:var(--radius);padding:12px;}
  .card .lbl{font-size:11px;color:var(--text-secondary);margin:0 0 4px;}
  .card .val{font-size:18px;font-weight:500;margin:0;}
  .card .sub2{font-size:10px;color:var(--text-secondary);margin:3px 0 0;}

  .filter-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .filter-label{font-size:11px;color:var(--text-secondary);white-space:nowrap;}
  .filterbar{display:flex;gap:6px;flex-wrap:wrap;}
  .filterbar button{padding:5px 12px;font-size:12px;border:0.5px solid var(--border);background:transparent;border-radius:var(--radius);cursor:pointer;font-family:inherit;}
  .filterbar button.active{background:var(--surface-1);font-weight:500;border-color:var(--text);}

  .search-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .search-row input{padding:6px 10px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius);width:220px;font-family:inherit;}
  .result-info{font-size:12px;color:var(--text-secondary);}
  .download-btn{margin-left:auto;padding:6px 14px;font-size:12px;border:0.5px solid var(--border);background:var(--surface-1);border-radius:var(--radius);cursor:pointer;font-family:inherit;}

  .tbl-wrap{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;font-size:11px;color:var(--text-secondary);font-weight:500;padding:9px 10px;background:var(--surface-1);border-bottom:0.5px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
  th:hover{background:#eae8e0;}
  th .sort-icon{margin-left:4px;opacity:0.4;}
  th.sorted .sort-icon{opacity:1;}
  td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;white-space:nowrap;}
  .row-미만기 td{background:#fff;}
  .row-30일이내 td{background:#fffbf0;}
  .row-30~60일 td{background:#fff3e0;}
  .row-60일초과 td{background:#fff0f0;}
  .row-pagado td{background:#f9fafb;color:var(--text-secondary);}
  .row-dday td{background:#fff8e1;}
  .badge{font-size:11px;padding:2px 8px;border-radius:var(--radius);display:inline-block;font-weight:500;}
  .badge-pagado{background:var(--success-bg);color:var(--success-text);}
  .badge-pendiente{background:var(--warning-bg);color:var(--warning-text);}
  .badge-overdue{background:var(--danger-bg);color:var(--danger-text);}
  .num{text-align:right;}
  .overdue-red{color:var(--danger-text);font-weight:500;}
  .overdue-warn{color:var(--warning-text);font-weight:500;}
  .overdue-dday{color:#1565C0;font-weight:500;}
  .overdue-ok{color:var(--text-secondary);}
</style>
</head>
<body>
<div class="wrap">
  <h1>AR 탭 — 구글 시트 실시간 연동</h1>
  <p class="sub" id="lastUpdate">데이터 불러오는 중...</p>
  <div class="status-bar loading" id="statusBox">구글 시트에서 데이터를 불러오는 중...</div>

  <div id="mainContent" style="display:none;">

    <div class="summary">
      <div class="card">
        <p class="lbl">미수금 (USD)</p>
        <p class="val" id="totalUSD">-</p>
      </div>
      <div class="card">
        <p class="lbl">미수금 (MXN)</p>
        <p class="val" id="totalMXN" style="font-size:15px;">-</p>
      </div>
      <div class="card"><p class="lbl">미만기</p><p class="val" id="cnt0" style="color:var(--text-secondary);">-</p></div>
      <div class="card"><p class="lbl">30일 이내</p><p class="val" id="cnt30" style="color:var(--warning);">-</p></div>
      <div class="card"><p class="lbl">30~60일</p><p class="val" id="cnt60" style="color:var(--warning);">-</p></div>
      <div class="card"><p class="lbl">60일 초과</p><p class="val" id="cnt60over" style="color:var(--danger);">-</p></div>
      <div class="card"><p class="lbl">미수금 총 건수</p><p class="val" id="totalCnt">-</p></div>
    </div>

    <div class="filter-row">
      <span class="filter-label">📅 기간</span>
      <div class="filterbar" id="yearFilter">
        <button onclick="setYear('recent',this)" class="active">최근 6개월</button>
        <button onclick="setYear('2026',this)">2026년</button>
        <button onclick="setYear('2025',this)">2025년</button>
        <button onclick="setYear('2024',this)">2024년</button>
        <button onclick="setYear('2023',this)">2023년</button>
        <button onclick="setYear('all',this)">전체 기록</button>
      </div>
    </div>
    <div class="filter-row" style="margin-bottom:12px;">
      <span class="filter-label">📋 상태</span>
      <div class="filterbar" id="statusFilter">
        <button onclick="setStatus('PENDIENTE',this)" class="active">미수금만</button>
        <button onclick="setStatus('all',this)">전체</button>
        <button onclick="setStatus('60일초과',this)" style="color:var(--danger-text);">60일초과</button>
        <button onclick="setStatus('30~60일',this)" style="color:var(--warning-text);">30~60일</button>
        <button onclick="setStatus('30일이내',this)" style="color:var(--warning-text);">30일이내</button>
      </div>
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="거래처명 검색..." oninput="applyFilters()">
      <span class="result-info" id="resultInfo"></span>
      <button class="download-btn" onclick="downloadCSV()">⬇ 엑셀 다운로드</button>
    </div>

    <div class="tbl-wrap">
      <table id="mainTable">
        <thead>
          <tr>
            <th onclick="sortTable(this,'NO')">NO <span class="sort-icon">↕</span></th>
            <th onclick="sortTable(this,'FACTURA_MONTH')">발행월 <span class="sort-icon">↕</span></th>
            <th onclick="sortTable(this,'CLIENTE')">거래처 <span class="sort-icon">↕</span></th>
            <th onclick="sortTable(this,'FACTURA_NO')">FACTURA NO <span class="sort-icon">↕</span></th>
            <th onclick="sortTable(this,'FACTURA_DATE')">발행일 <span class="sort-icon">↕</span></th>
            <th>컨셉</th>
            <th>통화</th>
            <th class="num" onclick="sortTable(this,'SUB_TOTAL')">소계 <span class="sort-icon">↕</span></th>
            <th class="num">IVA</th>
            <th class="num" onclick="sortTable(this,'TOTAL')">합계 <span class="sort-icon">↕</span></th>
            <th>신용일수</th>
            <th onclick="sortTable(this,'PAYMENT_PLAN_DATE')">결제예정일 <span class="sort-icon">↕</span></th>
            <th>실제결제일</th>
            <th onclick="sortTable(this,'OVERDUE_DAYS')">연체일수 <span class="sort-icon">↕</span></th>
            <th>상태</th>
            <th>NOTE</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfv4TFloZqAVKyJXAoGCjP5xec3MvPGjTagc1btjwQzKXvICTmREywHrT1wNSl_6JN7vA_gsY2w8kB/pub?gid=1428414690&single=true&output=tsv';
let allRows = [];
let currentYear = 'recent';
let currentStatus = 'PENDIENTE';
let sortCol = 'OVERDUE_DAYS';
let sortDir = -1;
let currentFiltered = [];
const TODAY = new Date();
const SIX_MONTHS_AGO = new Date(TODAY.getFullYear(), TODAY.getMonth()-6, TODAY.getDate());

function parseTSV(text){
  const lines = text.replace(/\r/g,'').split('\n');
  const headers = lines[0].split('\t').map(h=>h.trim());
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals = line.split('\t');
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').trim());
    return obj;
  });
}

function fmt(v){ return (v!==null&&v!==undefined&&v!=='') ? v : '-'; }
function fmtNum(v){
  const n=parseFloat(String(v).replace(/,/g,''));
  if(isNaN(n)||n===0) return '-';
  return n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function getRowClass(status, bucket, days){
  if(status==='PAGADO') return 'row-pagado';
  if(bucket==='60일초과') return 'row-60일초과';
  if(bucket==='30~60일') return 'row-30~60일';
  if(bucket==='30일이내') return 'row-30일이내';
  const d = parseInt(days);
  if(d>=-3&&d<=0) return 'row-dday';
  return 'row-미만기';
}

function getBadgeClass(status, bucket){
  if(status==='PAGADO') return 'badge-pagado';
  if(bucket==='60일초과'||bucket==='30~60일') return 'badge-overdue';
  return 'badge-pendiente';
}

function getOverdueClass(bucket, days){
  if(bucket==='60일초과') return 'overdue-red';
  if(bucket==='30~60일'||bucket==='30일이내') return 'overdue-warn';
  const d = parseInt(days);
  if(d>=-3&&d<=0) return 'overdue-dday';
  return 'overdue-ok';
}

function getOverdueDisplay(days){
  if(days==='') return '-';
  const d = parseInt(days);
  if(d>0) return d+'일 경과';
  if(d===0) return 'D-day';
  return 'D'+d;
}

async function loadData(){
  try{
    const res = await fetch(TSV_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    allRows = parseTSV(text).filter(r=>r['NO']&&r['NO']!=='NO');

    const pending = allRows.filter(r=>r['PAYMENT_STATUS']==='PENDIENTE');
    const usdTotal = pending.filter(r=>r['CURRENCY']==='USD').reduce((s,r)=>s+(parseFloat((r['TOTAL']||'0').replace(/,/g,''))||0),0);
    const mxnTotal = pending.filter(r=>r['CURRENCY']==='MXN').reduce((s,r)=>s+(parseFloat((r['TOTAL']||'0').replace(/,/g,''))||0),0);

    document.getElementById('totalUSD').textContent = '$'+usdTotal.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
    document.getElementById('totalMXN').textContent = mxnTotal>0 ? '$'+mxnTotal.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}) : '-';
    document.getElementById('cnt0').textContent = pending.filter(r=>r['BUCKET']==='미만기').length+'건';
    document.getElementById('cnt30').textContent = pending.filter(r=>r['BUCKET']==='30일이내').length+'건';
    document.getElementById('cnt60').textContent = pending.filter(r=>r['BUCKET']==='30~60일').length+'건';
    document.getElementById('cnt60over').textContent = pending.filter(r=>r['BUCKET']==='60일초과').length+'건';
    document.getElementById('totalCnt').textContent = pending.length+'건';

    document.getElementById('statusBox').className = 'status-bar success';
    document.getElementById('statusBox').textContent = '✓ 구글 시트 연동 성공 — 전체 '+allRows.length+'건 (미수금 '+pending.length+'건)';
    document.getElementById('lastUpdate').textContent = '최종 업데이트: '+new Date().toLocaleString('ko-KR');
    document.getElementById('mainContent').style.display = 'block';
    applyFilters();
  } catch(e){
    document.getElementById('statusBox').className = 'status-bar error';
    document.getElementById('statusBox').textContent = '❌ 연동 실패 — '+e.message;
  }
}

function applyFilters(){
  const search = (document.getElementById('searchInput').value||'').toLowerCase();
  let filtered = [...allRows];

  if(currentYear==='recent'){
    filtered = filtered.filter(r=>{
      if(!r['FACTURA_DATE']||r['FACTURA_DATE']==='-') return false;
      return new Date(r['FACTURA_DATE']) >= SIX_MONTHS_AGO;
    });
  } else if(currentYear!=='all'){
    filtered = filtered.filter(r=>r['YEAR']===currentYear);
  }

  if(currentStatus==='PENDIENTE') filtered = filtered.filter(r=>r['PAYMENT_STATUS']==='PENDIENTE');
  else if(['60일초과','30~60일','30일이내','미만기'].includes(currentStatus)) filtered = filtered.filter(r=>r['BUCKET']===currentStatus);

  if(search) filtered = filtered.filter(r=>(r['CLIENTE']||'').toLowerCase().includes(search));

  filtered.sort((a,b)=>{
    let va=a[sortCol]||'', vb=b[sortCol]||'';
    const na=parseFloat(va), nb=parseFloat(vb);
    if(!isNaN(na)&&!isNaN(nb)) return (na-nb)*sortDir;
    return va.localeCompare(vb)*sortDir;
  });

  currentFiltered = filtered;
  document.getElementById('resultInfo').textContent = '현재 표시: '+filtered.length+'건';
  renderTable(filtered);
}

function setYear(val, btn){
  currentYear = val;
  document.querySelectorAll('#yearFilter button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setStatus(val, btn){
  currentStatus = val;
  document.querySelectorAll('#statusFilter button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function sortTable(th, col){
  if(sortCol===col) sortDir*=-1;
  else { sortCol=col; sortDir=-1; }
  document.querySelectorAll('th').forEach(t=>{
    t.classList.remove('sorted');
    const icon=t.querySelector('.sort-icon');
    if(icon) icon.textContent='↕';
  });
  th.classList.add('sorted');
  const icon=th.querySelector('.sort-icon');
  if(icon) icon.textContent=sortDir===1?'↑':'↓';
  applyFilters();
}

function renderTable(rows){
  if(rows.length===0){
    document.getElementById('tableBody').innerHTML='<tr><td colspan="16" style="text-align:center;padding:20px;color:var(--text-secondary);">해당 조건의 데이터가 없습니다</td></tr>';
    return;
  }
  document.getElementById('tableBody').innerHTML=rows.map(r=>{
    const status=r['PAYMENT_STATUS'];
    const bucket=r['BUCKET'];
    const days=r['OVERDUE_DAYS'];
    return `<tr class="${getRowClass(status,bucket,days)}">
      <td>${fmt(r['NO'])}</td>
      <td>${fmt(r['FACTURA_MONTH'])}</td>
      <td>${fmt(r['CLIENTE'])}</td>
      <td>${fmt(r['FACTURA_NO'])}</td>
      <td>${fmt(r['FACTURA_DATE'])}</td>
      <td>${fmt(r['CONCEPT'])}</td>
      <td>${fmt(r['CURRENCY'])}</td>
      <td class="num">${fmtNum(r['SUB_TOTAL'])}</td>
      <td class="num">${fmtNum(r['IVA'])}</td>
      <td class="num">${fmtNum(r['TOTAL'])}</td>
      <td>${fmt(r['CREDIT_DAYS'])}</td>
      <td>${fmt(r['PAYMENT_PLAN_DATE'])}</td>
      <td>${fmt(r['ACTUAL_PAYMENT_DATE'])}</td>
      <td class="${getOverdueClass(bucket,days)}">${getOverdueDisplay(days)}</td>
      <td><span class="badge ${getBadgeClass(status,bucket)}">${fmt(status)}</span></td>
      <td style="font-size:11px;color:var(--text-secondary);">${fmt(r['NOTE'])}</td>
    </tr>`;
  }).join('');
}

function downloadCSV(){
  const headers=['NO','발행월','거래처','FACTURA_NO','발행일','컨셉','통화','소계','IVA','합계','신용일수','결제예정일','실제결제일','연체일수','상태','NOTE'];
  const keys=['NO','FACTURA_MONTH','CLIENTE','FACTURA_NO','FACTURA_DATE','CONCEPT','CURRENCY','SUB_TOTAL','IVA','TOTAL','CREDIT_DAYS','PAYMENT_PLAN_DATE','ACTUAL_PAYMENT_DATE','OVERDUE_DAYS','PAYMENT_STATUS','NOTE'];
  const csv=[headers.join(','),...currentFiltered.map(r=>keys.map(k=>'"'+(r[k]||'')+'"').join(','))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='AR_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

loadData();
</script>
</body>
</html>
