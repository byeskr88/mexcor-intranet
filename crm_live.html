<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객관리 CRM</title>
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--s1:#f1efe8;--s2:#e8e6de;
  --border:#e2e0d8;--text:#1f1e1c;--muted:#5f5e5a;--hint:#8a8880;
  --ok:#1D9E75;--ok-bg:#E1F5EE;--ok-text:#085041;
  --warn:#BA7517;--warn-bg:#FAEEDA;--warn-text:#854F0B;
  --danger:#A32D2D;--danger-bg:#FCEBEB;--danger-text:#791F1F;
  --blue:#2a78d6;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);min-height:100vh;}

.header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header h1{font-size:16px;font-weight:500;}
.header-right{display:flex;align-items:center;gap:8px;}
.btn{padding:6px 12px;font-size:12px;border-radius:var(--r);cursor:pointer;font-family:inherit;border:0.5px solid var(--border);background:var(--surface);color:var(--text);}
.btn:hover{background:var(--s1);}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);}
.btn-primary:hover{background:#333;}
.ts{font-size:11px;color:var(--hint);}

/* 알림 배너 */
.alerts-bar{background:var(--warn-bg);border-bottom:0.5px solid #EF9F27;padding:7px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.alert-chip{font-size:11px;color:var(--warn-text);display:flex;align-items:center;gap:4px;cursor:pointer;padding:2px 6px;border-radius:4px;}
.alert-chip:hover{background:rgba(0,0,0,.05);}
.alert-chip b{font-weight:600;}

/* 파이프라인 밸류 바 */
.pipeline-section{background:var(--surface);border-bottom:0.5px solid var(--border);padding:12px 20px;}
.pipeline-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.pipeline-title{font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;}
.pipeline-total{font-size:13px;font-weight:500;}
.pipeline-bars{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.pb-col{display:flex;flex-direction:column;gap:4px;}
.pb-label{font-size:10px;color:var(--muted);}
.pb-track{height:6px;background:var(--s2);border-radius:3px;overflow:hidden;}
.pb-fill{height:100%;border-radius:3px;transition:width .4s;}
.pb-val{font-size:11px;font-weight:500;}
.pb-cnt{font-size:10px;color:var(--hint);}

/* 통계 + 활동 피드 행 */
.top-row{display:grid;grid-template-columns:auto 1fr;gap:0;border-bottom:0.5px solid var(--border);background:var(--surface);}
.stats-bar{padding:10px 20px;display:flex;gap:8px;border-right:0.5px solid var(--border);}
.stat-card{background:var(--s1);border-radius:var(--r);padding:8px 14px;min-width:80px;}
.stat-card .lbl{font-size:10px;color:var(--muted);margin-bottom:2px;}
.stat-card .val{font-size:18px;font-weight:500;}

/* 활동 피드 */
.feed-bar{padding:10px 16px;overflow-x:auto;display:flex;align-items:center;gap:12px;min-width:0;}
.feed-item{display:flex;align-items:flex-start;gap:6px;flex-shrink:0;max-width:200px;}
.feed-dot{width:7px;height:7px;border-radius:50%;margin-top:3px;flex-shrink:0;}
.fd-blue{background:var(--blue);}
.fd-green{background:var(--ok);}
.fd-warn{background:var(--warn);}
.fd-danger{background:var(--danger);}
.feed-text{font-size:11px;}
.feed-name{font-weight:500;color:var(--text);}
.feed-desc{color:var(--muted);margin-top:1px;}
.feed-time{color:var(--hint);font-size:10px;}
.feed-divider{width:0.5px;height:32px;background:var(--border);flex-shrink:0;}

/* 칸반 보드 */
.board-wrap{padding:14px 20px;}
.board{display:flex;gap:10px;width:100%;}
.col{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;flex:1;min-width:100px;display:flex;flex-direction:column;}
.col-head{padding:9px 11px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.col-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.col-meta{display:flex;align-items:center;gap:5px;}
.col-cnt{font-size:10px;background:var(--s1);color:var(--muted);padding:1px 6px;border-radius:20px;}
.col-val{font-size:10px;color:var(--hint);}
.col-cards{padding:7px;flex:1;min-height:60px;}
.col.drag-over .col-cards{background:var(--blue-bg);border-radius:6px;}

/* 칸반 카드 */
.card{background:var(--s1);border:0.5px solid var(--border);border-radius:var(--r);padding:9px;margin-bottom:7px;cursor:pointer;transition:border-color .15s,transform .1s;}
.card:hover{border-color:var(--blue);transform:translateY(-1px);}
.card.dragging{opacity:.4;}
.card.selected{border-color:var(--blue);background:var(--blue-bg);}
.card:last-child{margin-bottom:0;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
.card-name{font-size:12px;font-weight:500;line-height:1.3;}
.flag{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:500;flex-shrink:0;}
.flag-kr{background:var(--blue-bg);color:var(--blue-text);}
.flag-mx{background:var(--ok-bg);color:var(--ok-text);}
.card-industry{font-size:10px;color:var(--hint);margin-bottom:4px;}
.card-product{font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.4;}
.card-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:6px;}
.cm{background:var(--surface);border-radius:5px;padding:4px 5px;text-align:center;}
.cm .cl{font-size:9px;color:var(--hint);}
.cm .cv{font-size:11px;font-weight:500;}
.next-action{background:var(--surface);border-radius:5px;padding:5px 7px;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:6px;}
.na-icon{flex-shrink:0;}
.na-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.na-due{font-weight:500;flex-shrink:0;}
.na-due.overdue{color:var(--danger-text);}
.na-due.soon{color:var(--warn-text);}
.na-due.ok{color:var(--ok-text);}
.card-foot{display:flex;align-items:center;justify-content:space-between;}
.card-days{font-size:10px;font-weight:500;}
.days-ok{color:var(--ok-text);}
.days-warn{color:var(--warn-text);}
.days-danger{color:var(--danger-text);}
.card-loc{font-size:10px;color:var(--hint);background:var(--s2);padding:1px 5px;border-radius:20px;}
.priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.p-high{background:var(--danger);}
.p-mid{background:var(--warn);}
.p-low{background:var(--ok);}

/* 컬럼 단계 색상 */
.col-active .col-name{color:var(--ok-text);}
.col-prospect .col-name{color:var(--muted);}
.col-qualified .col-name{color:var(--blue-text);}
.col-proposal .col-name{color:var(--purple-text);}
.col-negotiation .col-name{color:var(--warn-text);}
.col-empty{text-align:center;padding:16px 8px;font-size:11px;color:var(--hint);}

/* 상세 패널 */
.detail-panel{position:fixed;right:0;top:0;height:100vh;width:360px;background:var(--surface);border-left:0.5px solid var(--border);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease;}
.detail-panel.open{transform:translateX(0);}
.dp-head{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;}
.dp-avatar{width:38px;height:38px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--blue-text);flex-shrink:0;}
.dp-name{font-size:14px;font-weight:500;}
.dp-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.dp-close{margin-left:auto;background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);line-height:1;padding:4px;}
.dp-body{flex:1;overflow-y:auto;padding:14px 16px;}
.dp-section{margin-bottom:14px;}
.dp-section-title{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.info-cell{background:var(--s1);border-radius:6px;padding:7px 9px;}
.info-cell .lbl{font-size:10px;color:var(--hint);margin-bottom:2px;}
.info-cell .val{font-size:12px;font-weight:500;}
.stage-row{display:flex;align-items:center;gap:8px;}
.stage-select{padding:5px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--r);font-family:inherit;background:var(--surface);color:var(--text);flex:1;}
.win-bar-wrap{margin-top:4px;}
.win-label{display:flex;justify-content:space-between;font-size:10px;color:var(--hint);margin-bottom:3px;}
.win-track{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;}
.win-fill{height:100%;border-radius:3px;background:var(--blue);}
.ai-box{background:var(--purple-bg);border:0.5px solid #AFA9EC;border-radius:var(--r);padding:11px;}
.ai-label{font-size:10px;font-weight:600;color:var(--purple-text);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.ai-text{font-size:12px;color:var(--purple-text);line-height:1.6;}
.timeline{border-left:2px solid var(--border);padding-left:12px;margin-left:5px;}
.tl-item{position:relative;margin-bottom:10px;}
.tl-dot{position:absolute;left:-17px;top:3px;width:7px;height:7px;border-radius:50%;background:var(--s2);border:2px solid var(--border);}
.tl-dot.new{background:var(--blue);border-color:var(--blue);}
.tl-date{font-size:10px;color:var(--hint);margin-bottom:1px;}
.tl-text{font-size:12px;line-height:1.5;}
.tl-by{font-size:10px;color:var(--hint);}
.tl-empty{font-size:12px;color:var(--hint);text-align:center;padding:14px 0;}
.dp-footer{padding:10px 14px;border-top:0.5px solid var(--border);}
.contact-input-wrap{display:flex;flex-direction:column;gap:5px;}
.contact-input-wrap textarea{width:100%;padding:7px 9px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--r);font-family:inherit;resize:none;height:56px;background:var(--s1);color:var(--text);}
.contact-input-wrap textarea:focus{outline:none;border-color:var(--blue);}
.input-footer{display:flex;align-items:center;justify-content:space-between;}
.input-footer select{font-size:11px;border:0.5px solid var(--border);border-radius:5px;padding:4px 7px;font-family:inherit;background:var(--surface);}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border-radius:12px;padding:18px;width:380px;border:0.5px solid var(--border);}
.modal h2{font-size:14px;font-weight:500;margin-bottom:14px;}
.form-row{margin-bottom:9px;}
.form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:6px 9px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--r);font-family:inherit;background:var(--s1);color:var(--text);}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--blue);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:14px;}
.loading{text-align:center;padding:30px;color:var(--hint);}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg)}}
.edit-input{width:100%;padding:5px 8px;font-size:12px;border:0.5px solid var(--blue);border-radius:5px;font-family:inherit;background:var(--blue-bg);color:var(--text);}
.edit-input:focus{outline:none;}
.edit-mode .info-cell{background:var(--blue-bg);border:0.5px solid var(--blue);}
/* 액션 리스트 */
.action-item{display:flex;align-items:flex-start;gap:7px;padding:7px 0;border-bottom:0.5px solid var(--border);cursor:pointer;}
.action-item:last-child{border-bottom:none;}
.action-item:hover{opacity:.8;}
.ad{font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;white-space:nowrap;min-width:32px;text-align:center;flex-shrink:0;}
.ad-over{background:var(--danger-bg);color:var(--danger-text);}
.ad-soon{background:var(--warn-bg);color:var(--warn-text);}
.ad-ok{background:var(--ok-bg);color:var(--ok-text);}
.an{font-size:11px;font-weight:500;line-height:1.3;}
.at{font-size:10px;color:var(--muted);margin-top:1px;line-height:1.3;}
/* 캘린더 */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.cal-month{font-size:12px;font-weight:500;}
.cal-nav{background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted);padding:2px 4px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dh{text-align:center;font-size:9px;color:var(--hint);padding:2px 0;}
.cal-cell{height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:10px;cursor:default;}
.cal-cell.has{background:var(--blue-bg);color:var(--blue-text);font-weight:600;cursor:pointer;}
.cal-cell.has:hover{background:var(--blue-bg);opacity:.7;}
.cal-cell.today{background:var(--text);color:#fff;font-weight:600;}
.cal-cell.other{color:var(--hint);}
.cal-tooltip{margin-top:6px;font-size:10px;color:var(--muted);min-height:16px;}
.sb-sec{background:var(--s1);border-radius:var(--r);padding:9px;min-height:0;}
.sb-sec.grow{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sb-sec.grow #memoList{flex:1;overflow-y:auto;margin-bottom:6px;}
.sb-hd{display:flex;align-items:center;justify-content:space-between;font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
.sb-add-btn{background:none;border:0.5px solid var(--border);border-radius:4px;padding:1px 6px;font-size:13px;cursor:pointer;color:var(--muted);line-height:1.3;}
.sb-add-btn:hover{background:var(--s2);}
.sb-loading{font-size:11px;color:var(--hint);text-align:center;padding:8px 0;}
/* 공지 */
.notice-item{padding:6px 8px;border-radius:6px;margin-bottom:5px;font-size:11px;line-height:1.5;position:relative;}

.notice-item:last-child{margin-bottom:0;}
.notice-urgent{background:var(--danger-bg);border-left:2.5px solid var(--danger);}
.notice-normal{background:var(--blue-bg);border-left:2.5px solid var(--blue);}
.notice-info{background:var(--ok-bg);border-left:2.5px solid var(--ok);}
.notice-label{font-size:9px;font-weight:600;text-transform:uppercase;margin-bottom:2px;}
.notice-urgent .notice-label{color:var(--danger-text);}
.notice-normal .notice-label{color:var(--blue-text);}
.notice-info .notice-label{color:var(--ok-text);}
.notice-content{color:var(--text);}
.notice-meta{font-size:9px;color:var(--hint);margin-top:2px;display:flex;align-items:center;justify-content:space-between;}
.notice-del{background:none;border:none;cursor:pointer;font-size:11px;color:var(--hint);padding:0 2px;opacity:.5;}
.notice-del:hover{opacity:1;color:var(--danger-text);}
/* 메모 */
.memo-item{padding:5px 7px;background:var(--surface);border:0.5px solid var(--border);border-radius:5px;margin-bottom:4px;font-size:11px;display:flex;align-items:flex-start;gap:6px;}
.memo-item:last-child{margin-bottom:0;}
.memo-content{flex:1;line-height:1.4;}
.memo-del{background:none;border:none;cursor:pointer;font-size:11px;color:var(--hint);padding:0;opacity:.4;}
.memo-del:hover{opacity:1;color:var(--danger-text);}
.memo-date{font-size:9px;color:var(--hint);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f1e1c;color:#fff;padding:9px 16px;border-radius:var(--r);font-size:12px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<script src="nav.js"></script>


<div class="header">
  <h1 data-ko="고객관리" data-es="Clientes">고객관리</h1>
  <div class="header-right">
    <span class="ts" id="lastUpdate"></span>
    <button class="btn btn-primary" onclick="openNewModal()" data-ko="+ 신규 거래처" data-es="+ Nuevo Cliente">+ 신규 거래처</button>
  </div>
</div>

<div class="alerts-bar" id="alertsBar" style="display:none;"></div>

<!-- 파이프라인 밸류 -->
<div class="pipeline-section">
  <div class="pipeline-header">
    <span class="pipeline-title" data-ko="파이프라인 금액" data-es="Valor de Pipeline">파이프라인 금액</span>
    <span class="pipeline-total" id="pipeTotal">-</span>
  </div>
  <div class="pipeline-bars" id="pipelineBars"></div>
</div>

<!-- 통계 + 활동 피드 -->
<div class="top-row">
  <div class="stats-bar">
    <div class="stat-card"><div class="lbl" data-ko="전체" data-es="Total">전체</div><div class="val" id="statTotal">-</div></div>
    <div class="stat-card"><div class="lbl">Active</div><div class="val" style="color:var(--ok-text)" id="statActive">-</div></div>
    <div class="stat-card"><div class="lbl" data-ko="파이프라인" data-es="Pipeline">파이프라인</div><div class="val" style="color:var(--blue-text)" id="statPipe">-</div></div>
    <div class="stat-card"><div class="lbl" data-ko="팔로업 필요" data-es="Necesita Seguim.">팔로업 필요</div><div class="val" style="color:var(--warn-text)" id="statFollowup">-</div></div>
  </div>
  <div class="feed-bar" id="feedBar"><span style="font-size:12px;color:var(--hint);" data-ko="활동 피드 로드 중..." data-es="Cargando actividad...">활동 피드 로드 중...</span></div>
</div>

<div style="display:flex;gap:0;align-items:flex-start;">
<div class="board-wrap" style="flex:1;min-width:0;overflow-x:auto;">
  <div class="board" id="board">
    <div class="loading"><span class="spin"></span><span data-ko="불러오는 중..." data-es="Cargando...">불러오는 중...</span></div>
  </div>
</div>

<!-- 오른쪽 사이드바 -->
<div id="rightSidebar" style="width:560px;flex-shrink:0;border-left:0.5px solid var(--border);background:var(--surface);height:calc(100vh - 200px);padding:10px;overflow-y:auto;position:sticky;top:200px;">

  <!-- 2x2 그리드: 공지|캘린더 / 이번주액션|퀵메모 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;height:100%;">

    <!-- 왼쪽 위: 공지·지시사항 -->
    <div class="sb-sec" style="display:flex;flex-direction:column;overflow:hidden;">
      <div class="sb-hd">
        <span data-ko="📢 공지 · 지시사항" data-es="📢 Avisos · Instrucciones">📢 공지 · 지시사항</span>
        <button class="sb-add-btn" onclick="openNoticeModal()">+</button>
      </div>
      <div id="noticeList" style="flex:1;overflow-y:auto;"><div class="sb-loading" data-ko="로드 중..." data-es="Cargando...">로드 중...</div></div>
    </div>

    <!-- 오른쪽 위: 액션 캘린더 -->
    <div class="sb-sec" style="display:flex;flex-direction:column;overflow:hidden;">
      <div class="sb-hd"><span data-ko="액션 캘린더" data-es="Calendario de Acciones">액션 캘린더</span></div>
      <div id="miniCal"></div>
    </div>

    <!-- 왼쪽 아래: 이번 주 액션 -->
    <div class="sb-sec" style="display:flex;flex-direction:column;overflow:hidden;">
      <div class="sb-hd"><span data-ko="이번 주 액션" data-es="Acciones de la Semana">이번 주 액션</span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SURL='https://oezergrrqcinclorwvnk.supabase.co';
const SKEY='sb_publishable_1eqTksIg-IetXykOBHf0rg_19ourTmF';
const sb=supabase.createClient(SURL,SKEY);

const STAGES=[
  {id:'active',label:'Active',col:'col-active',color:'var(--ok)'},
  {id:'prospect',label:'Prospect',col:'col-prospect',color:'var(--s2)'},
  {id:'qualified',label:'Qualified',col:'col-qualified',color:'var(--blue)'},
  {id:'proposal',label:'Proposal',col:'col-proposal',color:'var(--purple)'},
  {id:'negotiation',label:'Negotiation',col:'col-negotiation',color:'var(--warn)'},
];

let accounts=[], logs={}, allLogs=[], selectedId=null;

let curLang = localStorage.getItem('mexcor_lang')||'ko';
const T_KO={total:'총 ',company:'개사',noContact:'컨택 기록 없음',daysNoContact:d=>d+'일 컨택 없음',
  today:'오늘',daysAgo:d=>d+'일 전',noActivity:'활동 없음',empty:'없음',noRecord:'기록없음',
  amount:'금액',winProb:'수주확률',contact:'컨택',days:'일',followupNeeded:'⚠ 팔로업 필요',
  action:'액션 없음',contactPerson:'담당자',location:'위치',product:'제품',expectedVal:'예상 금액',
  monthlyFc:'납품 FC',ytdRate:'YTD 달성율',nextAction:'다음 액션',note:'비고',noContactLog:'컨택 기록 없음',
  edit:'✏️ 수정',save:'💾 저장',industry:'산업군',winProbPct:'수주 확률 (%)',actionDue:'액션 마감일',
  analyzing:'분석 중...',aiFail:'AI 분석을 불러올 수 없습니다.'};
const T_ES={total:'Total ',company:'',noContact:'Sin registro de contacto',daysNoContact:d=>`Sin contacto hace ${d} días`,
  today:'Hoy',daysAgo:d=>`Hace ${d} días`,noActivity:'Sin actividad',empty:'Vacío',noRecord:'Sin registro',
  amount:'Monto',winProb:'Prob. Cierre',contact:'Contacto',days:' días',followupNeeded:'⚠ Necesita Seguimiento',
  action:'Sin acciones',contactPerson:'Contacto',location:'Ubicación',product:'Producto',expectedVal:'Monto Estimado',
  monthlyFc:'FC de Entrega',ytdRate:'Cumplim. YTD',nextAction:'Próxima Acción',note:'Nota',noContactLog:'Sin registros de contacto',
  edit:'✏️ Editar',save:'💾 Guardar',industry:'Industria',winProbPct:'Prob. de Cierre (%)',actionDue:'Fecha Límite',
  analyzing:'Analizando...',aiFail:'No se pudo cargar el análisis de IA.'};
function T(){ return curLang==='es'?T_ES:T_KO; }
document.addEventListener('mexcorLangChange',function(e){
  curLang=e.detail.lang;
  renderAll();updateStats();renderAlerts();renderPipeline();renderFeed();renderActionList();renderMiniCal();
  if(selectedId) openDetail(selectedId);
});

async function loadAll(){
  const {data:acc}=await sb.from('accounts').select('*').order('name');
  if(acc) accounts=acc;
  const {data:lg}=await sb.from('contact_logs').select('*').order('created_at',{ascending:false});
  if(lg){
    allLogs=lg;
    logs={};
    lg.forEach(l=>{
      if(!logs[l.account_id]) logs[l.account_id]=[];
      logs[l.account_id].push(l);
    });
  }
  renderAll();
  updateStats();
  renderAlerts();
  renderPipeline();
  renderFeed();
  document.getElementById('lastUpdate').textContent=(curLang==='es'?'Actualizado ':'업데이트 ')+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

// ===== 파이프라인 밸류 =====
function renderPipeline(){
  const maxVal=Math.max(...STAGES.map(s=>accounts.filter(a=>a.stage===s.id).reduce((sum,a)=>(sum+(a.expected_value||0)),0)),1);
  const total=accounts.reduce((s,a)=>s+(a.expected_value||0),0);
  document.getElementById('pipeTotal').textContent=T().total+'$'+total.toLocaleString();
  document.getElementById('pipelineBars').innerHTML=STAGES.map(s=>{
    const cards=accounts.filter(a=>a.stage===s.id);
    const val=cards.reduce((sum,a)=>sum+(a.expected_value||0),0);
    const pct=Math.round(val/maxVal*100);
    return `<div class="pb-col">
      <div class="pb-label">${s.label}</div>
      <div class="pb-track"><div class="pb-fill" style="width:${pct}%;background:${s.color};"></div></div>
      <div class="pb-val">$${val.toLocaleString()}</div>
      <div class="pb-cnt">${cards.length}${T().company}</div>
    </div>`;
  }).join('');
}

// ===== 활동 피드 =====
function renderFeed(){
  const recent=allLogs.slice(0,8);
  const alerts=accounts.filter(a=>{const d=lastContactDays(a.id);return (d===null&&a.stage!=='won'&&a.stage!=='lost')||(d!==null&&d>30);}).slice(0,3);
  const bar=document.getElementById('feedBar');
  let html='';
  alerts.forEach(a=>{
    const d=lastContactDays(a.id);
    html+=`<div class="feed-item"><div class="feed-dot fd-danger"></div><div class="feed-text"><div class="feed-name">${a.name}</div><div class="feed-desc">${d===null?T().noContact:T().daysNoContact(d)}</div></div></div><div class="feed-divider"></div>`;
  });
  recent.forEach(l=>{
    const acc=accounts.find(a=>a.id===l.account_id);
    if(!acc) return;
    const days=Math.floor((Date.now()-new Date(l.created_at))/86400000);
    const color=days===0?'fd-green':days<7?'fd-blue':'fd-warn';
    html+=`<div class="feed-item"><div class="feed-dot ${color}"></div><div class="feed-text"><div class="feed-name">${acc.name}</div><div class="feed-desc">${l.content.slice(0,30)}${l.content.length>30?'...':''}</div><div class="feed-time">${days===0?T().today:T().daysAgo(days)} · ${l.logged_by||'DJ'}</div></div></div><div class="feed-divider"></div>`;
  });
  bar.innerHTML=html||'<span style="font-size:11px;color:var(--hint);">'+T().noActivity+'</span>';
}

// ===== 칸반 렌더 =====
function renderAll(){
  const board=document.getElementById('board');
  board.innerHTML='';
  STAGES.forEach(st=>{
    const cards=accounts.filter(a=>a.stage===st.id);
    const stageVal=cards.reduce((s,a)=>s+(a.expected_value||0),0);
    const col=document.createElement('div');
    col.className=`col ${st.col}`;
    col.dataset.stage=st.id;
    col.innerHTML=`<div class="col-head">
      <span class="col-name">${st.label}</span>
      <div class="col-meta">
        <span class="col-cnt">${cards.length}</span>
        ${stageVal>0?`<span class="col-val">$${(stageVal/1000).toFixed(0)}K</span>`:''}
      </div>
    </div><div class="col-cards" id="cards-${st.id}"></div>`;
    board.appendChild(col);
    setupDrop(col);
    const container=col.querySelector('.col-cards');
    if(cards.length===0){
      container.innerHTML='<div class="col-empty">'+T().empty+'</div>';
    } else {
      cards.sort((a,b)=>{const p={high:0,medium:1,low:2};return (p[a.priority||'medium']||1)-(p[b.priority||'medium']||1);});
      cards.forEach(a=>container.appendChild(makeCard(a)));
    }
  });
}

function dueDays(dateStr){
  if(!dateStr) return null;
  return Math.ceil((new Date(dateStr)-Date.now())/86400000);
}
function dueCls(d){return d<0?'overdue':d<=3?'soon':'ok';}
function dueText(d){return d<0?`D+${Math.abs(d)}`:d===0?T().today:`D-${d}`;}

function makeCard(a){
  const div=document.createElement('div');
  div.className='card'+(selectedId===a.id?' selected':'');
  div.dataset.id=a.id;
  div.draggable=true;
  const daysSince=lastContactDays(a.id);
  const daysHtml=daysSince===null
    ?'<span class="card-days" style="color:var(--hint);">'+T().noRecord+'</span>'
    :daysSince>30?`<span class="card-days days-danger">${T().daysAgo(daysSince)}</span>`
    :daysSince>14?`<span class="card-days days-warn">${T().daysAgo(daysSince)}</span>`
    :`<span class="card-days days-ok">${T().daysAgo(daysSince)}</span>`;
  const due=dueDays(a.next_action_date);
  const pDot={high:'p-high',medium:'p-mid',low:'p-low'}[a.priority||'medium']||'p-mid';
  div.innerHTML=`
    <div class="card-top">
      <div style="display:flex;align-items:flex-start;gap:5px;flex:1;min-width:0;">
        <div class="priority-dot ${pDot}"></div>
        <span class="card-name">${a.name}</span>
      </div>
      <span class="flag flag-${(a.flag||'KR').toLowerCase()}">${a.flag||'KR'}</span>
    </div>
    ${a.industry?`<div class="card-industry">${a.industry}</div>`:''}
    ${a.products?`<div class="card-product">${a.products}</div>`:''}
    <div class="card-metrics">
      <div class="cm"><div class="cl">${T().amount}</div><div class="cv" style="color:var(--blue-text);">${a.expected_value?'$'+(a.expected_value/1000).toFixed(0)+'K':'-'}</div></div>
      <div class="cm"><div class="cl">${T().winProb}</div><div class="cv" style="color:${(a.win_probability||0)>=60?'var(--ok-text)':(a.win_probability||0)>=30?'var(--warn-text)':'var(--hint)'};">${a.win_probability||0}%</div></div>
      <div class="cm"><div class="cl">${T().contact}</div><div class="cv">${daysSince===null?'-':daysSince+T().days}</div></div>
    </div>
    ${a.next_action?`<div class="next-action"><span class="na-icon">📌</span><span class="na-text">${a.next_action}</span>${due!==null?`<span class="na-due ${dueCls(due)}">${dueText(due)}</span>`:''}</div>`:''}
    <div class="card-foot">${daysHtml}<span class="card-loc">${a.location||'-'}</span></div>`;
  div.onclick=()=>openDetail(a.id);
  div.ondragstart=e=>{e.dataTransfer.setData('id',a.id);div.classList.add('dragging');};
  div.ondragend=()=>div.classList.remove('dragging');
  return div;
}

function lastContactDays(id){
  if(!logs[id]||logs[id].length===0) return null;
  return Math.floor((Date.now()-new Date(logs[id][0].created_at))/86400000);
}

function updateStats(){
  document.getElementById('statTotal').textContent=accounts.length;
  document.getElementById('statActive').textContent=accounts.filter(a=>a.stage==='active').length;
  document.getElementById('statPipe').textContent=accounts.filter(a=>['prospect','qualified','proposal','negotiation'].includes(a.stage)).length;
  const fu=accounts.filter(a=>{const d=lastContactDays(a.id);return a.stage!=='won'&&a.stage!=='lost'&&(d===null||d>30);}).length;
  document.getElementById('statFollowup').textContent=fu;
}

function renderAlerts(){
  const bar=document.getElementById('alertsBar');
  const items=accounts.filter(a=>{
    if(a.stage==='won'||a.stage==='lost') return false;
    const d=lastContactDays(a.id);
    return d===null||d>30;
  });
  if(items.length===0){bar.style.display='none';return;}
  bar.style.display='flex';
  bar.innerHTML='<span style="font-size:11px;font-weight:600;color:var(--warn-text);">'+T().followupNeeded+'</span>'+
    items.map(a=>{
      const d=lastContactDays(a.id);
      return `<div class="alert-chip" onclick="openDetail('${a.id}')"><b>${a.name}</b><span>${d===null?T().noRecord:T().daysAgo(d)}</span></div>`;
    }).join('<span style="color:var(--warn-text);opacity:.4;">|</span>');
}

// ===== 드래그앤드롭 =====
function setupDrop(col){
  col.ondragover=e=>{e.preventDefault();col.classList.add('drag-over');};
  col.ondragleave=()=>col.classList.remove('drag-over');
  col.ondrop=async e=>{
    e.preventDefault();col.classList.remove('drag-over');
    const id=e.dataTransfer.getData('id');
    const newStage=col.dataset.stage;
    if(!id||!newStage) return;
    const acc=accounts.find(a=>a.id===id);
    if(!acc||acc.stage===newStage) return;
    await sb.from('accounts').update({stage:newStage,updated_at:new Date()}).eq('id',id);
    showToast(`${acc.name} → ${STAGES.find(s=>s.id===newStage)?.label}`);
    await loadAll();
    if(selectedId===id) openDetail(id);
  };
}

// ===== 상세 패널 =====
async function openDetail(id){
  selectedId=id;
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('selected',c.dataset.id===id));
  const a=accounts.find(x=>x.id===id);
  if(!a) return;
  const initials=a.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('dpAvatar').textContent=initials;
  document.getElementById('dpName').textContent=a.name;
  document.getElementById('dpSub').textContent=(a.industry||'-')+' · '+(a.location||'-');
  document.getElementById('dpStageSelect').value=a.stage||'prospect';
  document.getElementById('dpPriority').value=a.priority||'medium';
  const wp=a.win_probability||0;
  document.getElementById('dpWinPct').textContent=wp+'%';
  document.getElementById('dpWinFill').style.width=wp+'%';
  document.getElementById('dpWinFill').style.background=wp>=60?'var(--ok)':wp>=30?'var(--warn)':'var(--danger)';
  const due=dueDays(a.next_action_date);
  document.getElementById('dpInfo').innerHTML=`
    <div class="info-cell"><div class="lbl">${T().contactPerson}</div><div class="val">${a.contact_person||'-'}</div></div>
    <div class="info-cell"><div class="lbl">${T().location}</div><div class="val">${a.location||'-'}</div></div>
    <div class="info-cell"><div class="lbl">${T().product}</div><div class="val">${a.products||'-'}</div></div>
    <div class="info-cell"><div class="lbl">${T().expectedVal}</div><div class="val" style="color:var(--blue-text);">${a.expected_value?'$'+a.expected_value.toLocaleString():'-'}</div></div>
    <div class="info-cell"><div class="lbl">${T().monthlyFc}</div><div class="val">${a.monthly_fc||'-'}</div></div>
    <div class="info-cell"><div class="lbl">${T().ytdRate}</div><div class="val">${a.ytd_rate||'-'}</div></div>
    ${a.next_action?`<div class="info-cell" style="grid-column:1/-1;"><div class="lbl">${T().nextAction} ${due!==null?`<span style="color:${due<0?'var(--danger-text)':due<=3?'var(--warn-text)':'var(--ok-text)'}">(${dueText(due)})</span>`:''}}</div><div class="val">${a.next_action}</div></div>`:''}
    ${a.note?`<div class="info-cell" style="grid-column:1/-1;"><div class="lbl">${T().note}</div><div class="val">${a.note}</div></div>`:''}`;
  renderTimeline(id);
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('aiText').innerHTML='<span style="color:var(--hint);font-style:italic;">'+T().analyzing+'</span>';
  getAISummary(id,a);
}

function closeDetail(){
  selectedId=null;
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('detailPanel').classList.remove('open');
}

function renderTimeline(id){
  const tl=document.getElementById('dpTimeline');
  const items=logs[id]||[];
  if(items.length===0){tl.innerHTML='<div class="tl-empty">'+T().noContactLog+'</div>';return;}
  tl.innerHTML=items.map((l,i)=>`<div class="tl-item">
    <div class="tl-dot${i===0?' new':''}"></div>
    <div class="tl-date">${new Date(l.created_at).toLocaleDateString('ko-KR')}</div>
    <div class="tl-text">${l.content}</div>
    <div class="tl-by">${l.logged_by||'DJ'}</div>
  </div>`).join('');
}

async function changeStage(v){
  if(!selectedId) return;
  const a=accounts.find(x=>x.id===selectedId);
  await sb.from('accounts').update({stage:v,updated_at:new Date()}).eq('id',selectedId);
  showToast(`${a.name} → ${STAGES.find(s=>s.id===v)?.label||v}`);
  await loadAll();
  document.getElementById('dpSub').textContent=(a.industry||'-')+' · '+(a.location||'-');
}

async function changePriority(v){
  if(!selectedId) return;
  await sb.from('accounts').update({priority:v}).eq('id',selectedId);
  await loadAll();
  showToast(curLang==='es'?'Prioridad actualizada':'우선순위 변경됨');
}

async function saveContact(){
  const content=document.getElementById('contactInput').value.trim();
  const loggedBy=document.getElementById('loggedBy').value;
  if(!content||!selectedId) return;
  await sb.from('contact_logs').insert({account_id:selectedId,content,logged_by:loggedBy});
  document.getElementById('contactInput').value='';
  await loadAll();
  renderTimeline(selectedId);
  showToast('저장됨');
  const a=accounts.find(x=>x.id===selectedId);
  if(a) getAISummary(selectedId,a);
}

// ===== AI 요약 =====
async function getAISummary(id,a){
  const logItems=logs[id]||[];
  const el=document.getElementById('aiText');
  const systemPrompt=curLang==='es'
    ?'Eres un asistente de CRM de ventas B2B. Basándote en la información del cliente y el registro de contactos, resume la situación en 2-3 oraciones y sugiere la próxima acción. Responde en español de forma concisa.'
    :'당신은 B2B 영업 CRM 어시스턴트입니다. 거래처 정보와 컨택 로그를 바탕으로 2-3문장으로 현황을 요약하고 다음 액션을 제안하세요. 한국어로 간결하게 답변하세요.';
  let userMsg=`거래처: ${a.name} (${a.stage} 단계, ${a.location||'위치 미상'}, ${a.industry||'산업 미상'})\n제품: ${a.products||'미정'}\n수주 확률: ${a.win_probability||0}%\n예상 금액: $${a.expected_value||0}\n`;
  if(logItems.length===0){
    userMsg+='컨택 기록: 없음';
  } else {
    const last3=logItems.slice(0,3).map(l=>`[${new Date(l.created_at).toLocaleDateString('ko-KR')}] ${l.content}`).join('\n');
    userMsg+=`최근 컨택:\n${last3}`;
  }
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,system:systemPrompt,messages:[{role:'user',content:userMsg}]})
    });
    const data=await res.json();
    el.textContent=data.content?.[0]?.text||(curLang==='es'?'No se pudo analizar':'분석 불가');
  } catch(e){
    el.textContent=T().aiFail;
  }
}

async function createAccount(){
  const name=document.getElementById('nName').value.trim();
  if(!name){showToast(curLang==='es'?'Ingrese el nombre del cliente':'거래처명을 입력해주세요');return;}
  await sb.from('accounts').insert({
    name,flag:document.getElementById('nFlag').value,
    stage:document.getElementById('nStage').value,
    priority:document.getElementById('nPriority').value,
    location:document.getElementById('nLoc').value,
    industry:document.getElementById('nIndustry').value,
    products:document.getElementById('nProducts').value,
    contact_person:document.getElementById('nContact').value,
    expected_value:parseFloat(document.getElementById('nValue').value)||0,
    next_action:document.getElementById('nAction').value,
    note:document.getElementById('nNote').value,
  });
  closeNewModal();
  ['nName','nLoc','nIndustry','nProducts','nContact','nValue','nAction','nNote'].forEach(id=>document.getElementById(id).value='');
  await loadAll();
  showToast(curLang==='es'?`${name} agregado`:`${name} 추가됨`);
}

async function saveEdit(){
  if(!selectedId) return;
  const fields = ['contact_person','location','industry','expected_value','win_probability','monthly_fc','ytd_rate','products','next_action','next_action_date','note'];
  const updates = {updated_at: new Date()};
  fields.forEach(f=>{
    const el = document.getElementById('ei_'+f);
    if(!el) return;
    if(f==='expected_value'||f==='win_probability'){
      updates[f] = parseFloat(el.value)||0;
    } else {
      updates[f] = el.value;
    }
  });
  await sb.from('accounts').update(updates).eq('id', selectedId);
  await loadAll();
  openDetail(selectedId);
  showToast('수정 저장됨');
}

// ===== 액션 D-day 리스트 =====
function renderActionList(){
  const now = Date.now();
  const items = accounts
    .filter(a=>a.next_action && a.next_action_date && a.stage!=='won' && a.stage!=='lost')
    .map(a=>({...a, days: Math.ceil((new Date(a.next_action_date)-now)/86400000)}))
    .sort((a,b)=>a.days-b.days)
    .slice(0,8);
  const el = document.getElementById('actionList');
  if(items.length===0){el.innerHTML='<div style="font-size:11px;color:var(--hint);text-align:center;padding:12px 0;">'+T().action+'</div>';return;}
  el.innerHTML = items.map(a=>{
    const cls = a.days<0?'ad-over':a.days<=3?'ad-soon':'ad-ok';
    const txt = a.days<0?`D+${Math.abs(a.days)}`:a.days===0?T().today:`D-${a.days}`;
    return `<div class="action-item" onclick="openDetail('${a.id}')">
      <span class="ad ${cls}">${txt}</span>
      <div><div class="an">${a.name}</div><div class="at">${a.next_action}</div></div>
    </div>`;
  }).join('');
}

// ===== 미니 캘린더 =====
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function renderMiniCal(){
  const el = document.getElementById('miniCal');
  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  // 이달 액션 날짜들
  const actionDates = {};
  accounts.filter(a=>a.next_action_date).forEach(a=>{
    const d = new Date(a.next_action_date);
    if(d.getFullYear()===calYear && d.getMonth()===calMonth){
      const day = d.getDate();
      if(!actionDates[day]) actionDates[day]=[];
      actionDates[day].push(a.name);
    }
  });
  const monthNames=curLang==='es'
    ?['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
    :['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames=curLang==='es'?['D','L','M','X','J','V','S']:['일','월','화','수','목','금','토'];
  let html = `<div class="cal-hd">
    <button class="cal-nav" onclick="calNav(-1)">‹</button>
    <span class="cal-month">${calYear}${curLang==='es'?'':'년'} ${monthNames[calMonth]}</span>
    <button class="cal-nav" onclick="calNav(1)">›</button>
  </div>
  <div class="cal-grid">
    ${dayNames.map(d=>`<div class="cal-dh">${d}</div>`).join('')}`;
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell other"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate();
    const hasAction=actionDates[d];
    const cls=isToday?'today':hasAction?'has':'';
    const onclick=hasAction?`onclick="calClick(${d}, '${actionDates[d].join(', ')}')"` :'';
    html+=`<div class="cal-cell ${cls}" ${onclick} title="${hasAction?hasAction.join(', '):''}"> ${d}</div>`;
  }
  html+=`</div><div class="cal-tooltip" id="calTip"></div>`;
  el.innerHTML=html;
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderMiniCal();
}
function calClick(day, names){
  document.getElementById('calTip').textContent=`${day}일: ${names}`;
}

// ===== 공지/지시사항 =====
async function loadNotices(){
  const {data}=await sb.from('notices').select('*').order('created_at',{ascending:false}).limit(5);
  const el=document.getElementById('noticeList');
  if(!data||data.length===0){el.innerHTML='<div class="sb-loading">'+T().empty+'</div>';return;}
  const typeMap=curLang==='es'
    ?{urgent:['Urgente','notice-urgent'],normal:['Instrucción','notice-normal'],info:['Aviso','notice-info']}
    :{urgent:['긴급','notice-urgent'],normal:['지시','notice-normal'],info:['공지','notice-info']};
  el.innerHTML=data.map(n=>{
    const [lbl,cls]=typeMap[n.type]||typeMap.info;
    const date=new Date(n.created_at).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
    return `<div class="notice-item ${cls}">
      <div class="notice-label">${lbl}</div>
      <div class="notice-content">${n.content}</div>
      <div class="notice-meta"><span>${n.author} · ${date}</span><button class="notice-del" onclick="deleteNotice('${n.id}')">✕</button></div>
    </div>`;
  }).join('');
}
function openNoticeModal(){document.getElementById('noticeModal').style.display='flex';}
function closeNoticeModal(){document.getElementById('noticeModal').style.display='none';}
async function saveNotice(){
  const content=document.getElementById('nContent').value.trim();
  if(!content){showToast(curLang==='es'?'Ingrese el contenido':'내용을 입력해주세요');return;}
  await sb.from('notices').insert({type:document.getElementById('nType').value,content,author:document.getElementById('nAuthor').value});
  document.getElementById('nContent').value='';
  closeNoticeModal();
  loadNotices();
  showToast(curLang==='es'?'Aviso guardado':'공지 저장됨');
}
async function deleteNotice(id){
  if(!confirm(curLang==='es'?'¿Eliminar?':'삭제할까요?')) return;
  await sb.from('notices').delete().eq('id',id);
  loadNotices();
  showToast(curLang==='es'?'Eliminado':'삭제됨');
}

async function loadMemos(){
  const {data}=await sb.from('quick_notes').select('*').order('created_at',{ascending:false}).limit(10);
  const el=document.getElementById('memoList');
  if(!data||data.length===0){el.innerHTML='<div class="sb-loading">'+(curLang==='es'?'Sin notas':'메모 없음')+'</div>';return;}
  el.innerHTML=data.map(m=>{
    const date=new Date(m.created_at).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
    return `<div class="memo-item">
      <div class="memo-content">${m.content}<div class="memo-date">${m.author} · ${date}</div></div>
      <button class="memo-del" onclick="deleteMemo('${m.id}')">✕</button>
    </div>`;
  }).join('');
}
async function saveMemo(){
  const inp=document.getElementById('memoInput');
  const content=inp.value.trim();
  if(!content) return;
  await sb.from('quick_notes').insert({content,author:'DJ'});
  inp.value='';
  loadMemos();
  showToast(curLang==='es'?'Nota guardada':'메모 저장됨');
}
async function deleteMemo(id){

}

  const {data:acc}=await sb.from('accounts').select('*').order('name');

    allLogs=lg;logs={};

  renderAll();updateStats();renderAlerts();renderPipeline();renderFeed();
  renderActionList();
  renderMiniCal();

  document.getElementById('lastUpdate').textContent=(curLang==='es'?'Actualizado ':'업데이트 ')+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
};
