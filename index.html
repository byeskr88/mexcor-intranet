<title>MEXCOR 인트라넷</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f4f0;height:100vh;display:flex;flex-direction:column;}

/* 상단 네비게이션 */
.nav{background:#1f1e1c;height:48px;display:flex;align-items:center;padding:0 16px;gap:4px;flex-shrink:0;position:sticky;top:0;z-index:1000;}
.nav-logo{margin-right:12px;display:flex;align-items:center;}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;cursor:pointer;border:none;background:transparent;color:#b0aeab;font-family:inherit;font-size:12px;white-space:nowrap;transition:background .1s;}
.nav-tab:hover{background:#2e2d2b;color:#fff;}
.nav-tab.active{background:#2e2d2b;color:#fff;}
.nav-tab .tab-icon{font-size:14px;}
.nav-tab .tab-status{font-size:10px;padding:1px 5px;border-radius:20px;margin-left:2px;}
.ts-ok{background:#1a5c3c;color:#5DCAA5;}
.ts-warn{background:#5c3a0a;color:#EF9F27;}
.ts-danger{background:#5c1a1a;color:#F09595;}
.ts-gray{background:#333;color:#888;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.reload-btn{background:none;border:0.5px solid #3a3937;border-radius:5px;color:#888;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;}
.reload-btn:hover{border-color:#666;color:#ccc;}
.nav-time{font-size:11px;color:#666;}

/* iframe 영역 */
.content{flex:1;overflow:hidden;}
.content iframe{width:100%;height:100%;border:none;}
</style>
</head>

<script>
let currentPage = 'summary_live.html';
const SHEET_BASE='https://docs.google.com/spreadsheets/d/e/2PACX-1vRfv4TFloZqAVKyJXAoGCjP5xec3MvPGjTagc1btjwQzKXvICTmREywHrT1wNSl_6JN7vA_gsY2w8kB/pub?gid={G}&single=true&output=tsv';

// AVISO 상태 체크 (유효기간 임박 건수)
async function checkAviso(){
  try{
    const r=await fetch(SHEET_BASE.replace('{G}','0'));
    const t=await r.text();
    const rows=t.trim().split('\n').slice(1).map(l=>l.split('\t'));
    const today=new Date();
    const expiring=rows.filter(r=>{
      const exp=new Date(r[7]||r[8]||''); // 만료일 컬럼
      if(isNaN(exp)) return false;
      const days=Math.ceil((exp-today)/86400000);
      return days>=0&&days<=30;
    });
    const el=document.getElementById('st-aviso');
    if(expiring.length>0){el.textContent=`D-30 ${expiring.length}건`;el.className='tab-status ts-warn';}
    else{el.textContent='정상';el.className='tab-status ts-ok';}
  }catch(e){document.getElementById('st-aviso').textContent='확인';}
}
checkAviso();

function switchTab(page, btn){
  currentPage = page;
  document.getElementById('mainFrame').src = page;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function reloadCurrent(){
  document.getElementById('mainFrame').src = currentPage;
}

// 시간 표시
function updateTime(){
  document.getElementById('navTime').textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}
updateTime();
setInterval(updateTime, 60000);

// Summary에서 탭 상태 메시지 받기
window.addEventListener('message', function(e){
  if(e.data?.type === 'tabStatus'){
    const {tab, status, label} = e.data;
    const el = document.getElementById('st-'+tab);
    if(!el) return;
    el.textContent = label;
    el.className = 'tab-status ' + (status==='ok'?'ts-ok':status==='warn'?'ts-warn':status==='danger'?'ts-danger':'ts-gray');
  }
});

// 언어 토글
let lang = localStorage.getItem('lang')||'ko';
function toggleLang(){
  lang = lang==='ko'?'es':'ko';
  localStorage.setItem('lang',lang);
  document.getElementById('langBtn').textContent=lang==='ko'?'KO':'ES';
  applyLang();
  // iframe에 언어 변경 전달
  document.getElementById('mainFrame').contentWindow?.postMessage({type:'langChange',lang},'*');
}
const LABELS={
  ko:{summary:'Summary',aviso:'AVISO',ar:'AR',ap:'AP',sales:'매출',inv:'재고',crm:'고객관리'},
  es:{summary:'Resumen',aviso:'AVISO',ar:'CxC',ap:'CxP',sales:'Ventas',inv:'Inventario',crm:'Clientes'}
};
function applyLang(){
  const L=LABELS[lang]||LABELS.ko;
  document.querySelectorAll('.nav-tab').forEach(btn=>{
    const page=btn.dataset.page;
    if(page&&L[page]){
      const statusEl=btn.querySelector('.tab-status');
      const statusHtml=statusEl?statusEl.outerHTML:'';
      const icon=btn.querySelector('.tab-icon')?.outerHTML||'';
      btn.innerHTML=icon+' '+L[page]+(statusHtml?'\n'+statusHtml:'');
    }
  });
  document.getElementById('langBtn').textContent=lang==='ko'?'KO':'ES';
}
applyLang();
</script>
