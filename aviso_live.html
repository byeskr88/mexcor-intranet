<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVISO 탭 — 구글 시트 연동</title>
<style>
  :root{
    --bg:#f5f4f0;--surface:#fff;--surface-1:#f1efe8;
    --border:#e2e0d8;--text:#1f1e1c;--text-secondary:#5f5e5a;
    --success:#1D9E75;--success-bg:#E1F5EE;--success-text:#085041;
    --warning:#BA7517;--warning-bg:#FAEEDA;--warning-text:#854F0B;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:20px;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo",sans-serif;color:var(--text);}
  .wrap{max-width:100%;margin:0 auto;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:20px;}
  h1{font-size:17px;font-weight:500;margin:0 0 4px;}
  .sub{font-size:12px;color:var(--text-secondary);margin:0 0 16px;}
  .status{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;}
  .status.loading{background:var(--surface-1);color:var(--text-secondary);}
  .status.success{background:var(--success-bg);color:var(--success-text);}
  .status.error{background:#FCEBEB;color:#791F1F;}
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
  .card{background:var(--surface-1);border-radius:var(--radius);padding:12px;}
  .card .lbl{font-size:11px;color:var(--text-secondary);margin:0 0 4px;}
  .card .val{font-size:20px;font-weight:500;margin:0;}
  .filterbar{display:flex;gap:6px;margin-bottom:12px;}
  .filterbar button{padding:5px 12px;font-size:12px;border:0.5px solid var(--border);background:transparent;border-radius:var(--radius);cursor:pointer;font-family:inherit;}
  .filterbar button.active{background:var(--surface-1);font-weight:500;}
  .tbl-wrap{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  table.main{width:100%;border-collapse:collapse;font-size:13px;}
  table.main th{text-align:left;font-size:11px;color:var(--text-secondary);font-weight:500;padding:9px 12px;background:var(--surface-1);border-bottom:0.5px solid var(--border);white-space:nowrap;}
  table.main td{padding:10px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle;white-space:nowrap;}
  .row-header{cursor:pointer;}
  .row-header:hover td{background:rgba(55,138,221,0.04);}
  .arrow{font-size:12px;color:var(--text-secondary);margin-right:6px;display:inline-block;transition:transform 0.15s;}
  .detail-row td{padding:0;border-bottom:0.5px solid var(--border);background:var(--surface-1);}
  .detail-inner{padding:12px 16px 14px 40px;}
  .detail-inner table{width:100%;border-collapse:collapse;font-size:12px;}
  .detail-inner th{text-align:left;font-size:11px;color:var(--text-secondary);font-weight:400;padding:5px 8px;background:rgba(0,0,0,0.02);border-bottom:0.5px solid var(--border);}
  .detail-inner td{padding:5px 8px;border-bottom:0.5px solid var(--border);color:var(--text-secondary);}
  .remark-box{margin-top:8px;padding:8px 10px;background:rgba(0,0,0,0.02);border-radius:var(--radius);font-size:12px;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .badge{font-size:11px;padding:2px 8px;border-radius:var(--radius);display:inline-block;}
  .badge.ok{background:var(--success-bg);color:var(--success-text);}
  .badge.proceso{background:var(--warning-bg);color:var(--warning-text);}
  .num{text-align:right;}
</style>
</head>
<body>
<div class="wrap">
  <h1>AVISO 탭 — 구글 시트 실시간 연동</h1>
  <p class="sub" id="lastUpdate">데이터 불러오는 중...</p>
  <div class="status loading" id="statusBox">구글 시트에서 데이터를 불러오는 중...</div>

  <div class="summary" id="summaryBox" style="display:none;">
    <div class="card"><p class="lbl">전체 PEDIDO</p><p class="val" id="totalCount">-</p></div>
    <div class="card"><p class="lbl">OK</p><p class="val" id="okCount" style="color:var(--success);">-</p></div>
    <div class="card"><p class="lbl">진행중(PROCESO)</p><p class="val" id="procesoCount" style="color:var(--warning);">-</p></div>
    <div class="card"><p class="lbl">비용합계 총액</p><p class="val" id="totalCost" style="font-size:15px;">-</p></div>
  </div>

  <div class="filterbar" id="filterbar" style="display:none;">
    <button class="active" onclick="filterData('all',this)">전체</button>
    <button onclick="filterData('OK',this)">OK</button>
    <button onclick="filterData('PROCESO',this)">진행중</button>
  </div>

  <div class="tbl-wrap" id="tableWrap" style="display:none;">
    <table class="main">
      <thead>
        <tr>
          <th>PEDIDO</th>
          <th>ESTATUS</th>
          <th>FECHA SOLICITUD</th>
          <th>DIAS</th>
          <th>CONTAINER QTY</th>
          <th class="num">ALMACENAJE</th>
          <th class="num">DEMORAS</th>
          <th class="num">PAGO AVISO</th>
          <th class="num">TOTAL</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
// TSV 방식으로 변경 (쉼표 파싱 문제 해결)
const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfv4TFloZqAVKyJXAoGCjP5xec3MvPGjTagc1btjwQzKXvICTmREywHrT1wNSl_6JN7vA_gsY2w8kB/pub?gid=0&single=true&output=tsv';
let groups = [];

function parseTSV(text){
  const lines = text.replace(/\r/g,'').split('\n');
  const headers = lines[0].split('\t').map(h=>h.trim());
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals = line.split('\t');
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').trim());
    return obj;
  });
}

function fmt(v){ return (v!==null&&v!==undefined&&v!=='') ? v : '-'; }
function fmtNum(v){
  const n=parseFloat(String(v).replace(/,/g,''));
  if(isNaN(n)||n===0) return '-';
  return '$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function groupRows(rows){
  const map={};const order=[];
  rows.forEach(r=>{
    const p=r['PEDIDO'];
    if(!p||p==='PEDIDO') return;
    if(!map[p]){
      map[p]={
        pedido:p, estatus:r['ESTATUS'], fecha:r['FECHA_SOLICITUD'],
        dias:r['DIAS_DICTAMINACION'], qty:r['CONTAINER_QTY'],
        alm:r['ALMACENAJE'], dem:r['DEMORAS'], pago:r['PAGO_AVISO'],
        total:r['BIENES_TOTAL'], remark:r['REMARK'], containers:[]
      };
      order.push(p);
    }
    map[p].containers.push({no:r['NO'], fp:r['FOLIO_PRESENTACION'], ft:r['FOLIO_TRAMITE']});
  });
  return order.map(p=>map[p]);
}

async function loadData(){
  try{
    const res = await fetch(TSV_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    const rows = parseTSV(text).filter(r=>r['PEDIDO']&&r['PEDIDO']!=='-'&&r['PEDIDO']!=='PEDIDO');
    groups = groupRows(rows);

    const okG = groups.filter(g=>g.estatus==='OK').length;
    const proG = groups.filter(g=>g.estatus==='PROCESO').length;
    const totalCost = groups.reduce((s,g)=>{
      const n=parseFloat((g.total||'0').replace(/,/g,''));
      return s+(isNaN(n)?0:n);
    },0);

    document.getElementById('totalCount').textContent = groups.length+'건';
    document.getElementById('okCount').textContent = okG+'건';
    document.getElementById('procesoCount').textContent = proG+'건';
    document.getElementById('totalCost').textContent = '$'+totalCost.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
    document.getElementById('summaryBox').style.display = 'grid';
    document.getElementById('filterbar').style.display = 'flex';
    document.getElementById('tableWrap').style.display = 'block';
    document.getElementById('statusBox').className = 'status success';
    document.getElementById('statusBox').textContent = '✓ 구글 시트 연동 성공 — PEDIDO '+groups.length+'건 불러옴';
    document.getElementById('lastUpdate').textContent = '최종 업데이트: '+new Date().toLocaleString('ko-KR');
    renderTable(groups);
  } catch(e){
    document.getElementById('statusBox').className = 'status error';
    document.getElementById('statusBox').textContent = '❌ 연동 실패 — '+e.message;
  }
}

function renderTable(data){
  let html='';
  data.forEach((g,i)=>{
    const cls = (g.estatus||'').toLowerCase();
    const containerRows = g.containers.map(c=>`
      <tr>
        <td>${fmt(c.no)}</td>
        <td>${fmt(c.fp)}</td>
        <td style="font-size:11px;">${fmt(c.ft)}</td>
      </tr>`).join('');
    const remarkHtml = (g.remark&&g.remark!=='-')
      ? `<div class="remark-box">📝 ${fmt(g.remark)}</div>` : '';

    html+=`
    <tr class="row-header" onclick="toggleDetail(${i})">
      <td><span class="arrow" id="arrow-${i}">▶</span>${fmt(g.pedido)}</td>
      <td><span class="badge ${cls}">${fmt(g.estatus)}</span></td>
      <td>${fmt(g.fecha)}</td>
      <td>${fmt(g.dias)}</td>
      <td>${fmt(g.qty)}</td>
      <td class="num">${fmtNum(g.alm)}</td>
      <td class="num">${fmtNum(g.dem)}</td>
      <td class="num">${fmtNum(g.pago)}</td>
      <td class="num">${fmtNum(g.total)}</td>
    </tr>
    <tr class="detail-row" id="detail-${i}" style="display:none;">
      <td colspan="9">
        <div class="detail-inner">
          <table>
            <tr><th>NO</th><th>FOLIO PRESENTACION</th><th>FOLIO TRAMITE</th></tr>
            ${containerRows}
          </table>
          ${remarkHtml}
        </div>
      </td>
    </tr>`;
  });
  document.getElementById('tableBody').innerHTML = html;
}

function toggleDetail(i){
  const row = document.getElementById('detail-'+i);
  const arrow = document.getElementById('arrow-'+i);
  const isOpen = row.style.display !== 'none';
  row.style.display = isOpen ? 'none' : 'table-row';
  arrow.textContent = isOpen ? '▶' : '▼';
}

function filterData(val, btn){
  document.querySelectorAll('.filterbar button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(val==='all' ? groups : groups.filter(g=>g.estatus===val));
}

loadData();
</script>
</body>
</html>
