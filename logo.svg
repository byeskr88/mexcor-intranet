  <polygon points="152,80 190,80 152,125" fill="#2d2d7a"/>
  <!-- 파란 스웨시 곡선 -->
  <path d="M 5,90 Q 100,120 195,70" stroke="#2a6cb7" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 5,98 Q 100,128 195,78" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
