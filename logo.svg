<svg xmlns="http://www.w3.org/2000/svg" width="200" height="140" viewBox="0 0 200 140">
  <!-- 왼쪽 기둥 -->
  <rect x="10" y="10" width="38" height="95" rx="19" fill="#2d2d7a"/>
  <!-- 왼쪽 기둥 하단 삼각 -->
  <polygon points="10,80 48,80 10,125" fill="#2d2d7a"/>
  <!-- 가운데 기둥 -->
  <rect x="81" y="10" width="38" height="95" rx="19" fill="#2d2d7a"/>
