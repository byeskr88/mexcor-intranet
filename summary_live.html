<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary — MEXCOR 인트라넷</title>
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--s1:#f1efe8;--s2:#e8e6de;
  --border:#e2e0d8;--text:#1f1e1c;--muted:#5f5e5a;--hint:#8a8880;
  --ok:#1D9E75;--ok-bg:#E1F5EE;--ok-text:#085041;
  --warn:#BA7517;--warn-bg:#FAEEDA;--warn-text:#854F0B;
  --danger:#A32D2D;--danger-bg:#FCEBEB;--danger-text:#791F1F;
  --blue:#2a78d6;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);padding:20px;}
.wrap{max-width:1200px;margin:0 auto;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:20px;}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.page-title{font-size:18px;font-weight:500;}
.page-ts{font-size:12px;color:var(--hint);margin-top:2px;}
.sbar{padding:7px 14px;border-radius:var(--r);font-size:12px;margin-bottom:18px;}
.sbar.loading{background:var(--s1);color:var(--muted);}
.sbar.ok{background:var(--ok-bg);color:var(--ok-text);}
.sbar.err{background:var(--danger-bg);color:var(--danger-text);}
.sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--hint);margin:20px 0 10px;}
.sec:first-of-type{margin-top:0;}
hr{border:none;border-top:0.5px solid var(--border);margin:18px 0;}
/* 카드 */
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{background:var(--s1);border-radius:var(--r);padding:14px;}
.card .lbl{font-size:11px;color:var(--muted);margin-bottom:4px;}
.card .val{font-size:22px;font-weight:600;}
.card .sub{font-size:11px;color:var(--muted);margin-top:3px;}
/* 매출 바 */
.mbars{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;align-items:end;}
.mbar-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.mbar-pct{font-size:10px;font-weight:600;min-height:14px;}
.mbar-track{width:100%;height:70px;background:var(--s2);border-radius:4px 4px 0 0;overflow:hidden;display:flex;align-items:flex-end;}
.mbar-fill{width:100%;transition:height .3s;}
.mbar-lbl{font-size:9px;color:var(--muted);}
/* 알림 */
.alerts{display:flex;flex-direction:column;gap:5px;}
.al{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r);font-size:12px;}
.al-d{background:var(--danger-bg);} .al-w{background:var(--warn-bg);} .al-b{background:var(--blue-bg);}
.al .tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.tag-d{background:var(--danger-text);color:#fff;} .tag-w{background:var(--warn-text);color:#fff;} .tag-b{background:var(--blue-text);color:#fff;}
.al .txt{flex:1;}
.al .bdg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(0,0,0,.08);white-space:nowrap;}
/* 파이프라인 */
.pipe{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:11px;}
.pipe:last-child{border-bottom:none;}
.pipe-lbl{width:90px;color:var(--muted);flex-shrink:0;}
.pipe-tr{flex:1;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;}
.pipe-fill{height:100%;border-radius:3px;}
.pipe-val{width:70px;text-align:right;font-weight:500;font-size:10px;flex-shrink:0;}
/* 액션 */
.action{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:11px;}
.action:last-child{border-bottom:none;}
.d-pill{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.d-over{background:var(--danger-bg);color:var(--danger-text);}
.d-soon{background:var(--warn-bg);color:var(--warn-text);}
.d-ok{background:var(--ok-bg);color:var(--ok-text);}
/* 재고 */
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:11px;}
.inv-row:last-child{border-bottom:none;}
.moh-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.moh-d{background:var(--danger-bg);color:var(--danger-text);}
.moh-w{background:var(--warn-bg);color:var(--warn-text);}
.inner{background:var(--surface);border-radius:var(--r);padding:12px 14px;border:0.5px solid var(--border);}

/* 매출 카드 - sales_live 동일 */
.sales-cards{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px;}
.s-card{background:var(--s1);border-radius:var(--r);padding:12px 14px;}
.s-card .lbl{font-size:11px;color:var(--muted);margin-bottom:4px;}
.s-card .val{font-size:18px;font-weight:600;}
.s-card .sub2{font-size:11px;margin-top:3px;}
/* 월별 바 - 가로 12개 */
.month-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;}
.m-col{display:flex;flex-direction:column;align-items:center;gap:2px;}
.m-pct{font-size:10px;font-weight:600;min-height:14px;text-align:center;}
.m-track{width:100%;height:60px;background:var(--s2);border-radius:3px 3px 0 0;overflow:hidden;display:flex;align-items:flex-end;}
.m-fill{width:100%;}
.m-lbl{font-size:9px;color:var(--muted);}
.m-amt{font-size:9px;color:var(--muted);min-height:12px;}
</style>
</head>
<body>
<script src="nav.js"></script>

<div class="wrap">
  <div class="page-head">
    <div>
      <div class="page-title">MEXCOR 인트라넷</div>
      <div class="page-ts" id="pageTs">데이터 불러오는 중...</div>
    </div>
  </div>
  <div class="sbar loading" id="sbar">데이터 불러오는 중...</div>

  <!-- 매출 -->
  <div class="sec" id="sec-sales"><span data-ko="📊 매출 현황" data-es="📊 Ventas">📊 매출 현황</span></div>
  <div class="sales-cards">
    <div class="s-card"><div class="lbl" id="lbl-plan" data-ko="연간 계획" data-es="Plan Anual">연간 계획</div><div class="val" id="kPlan">-</div></div>
    <div class="s-card"><div class="lbl" id="lbl-ytd-act" data-ko="YTD 실적" data-es="Real YTD">YTD 실적</div><div class="val" id="kYtdAct">-</div><div class="sub2" id="kYtdActSub">-</div></div>
    <div class="s-card"><div class="lbl">MTY YTD</div><div class="val" style="color:var(--blue-text);" id="kMty">-</div><div class="sub2" id="kMtySub">-</div></div>
    <div class="s-card"><div class="lbl">QRO YTD</div><div class="val" style="color:var(--purple-text);" id="kQro">-</div><div class="sub2" id="kQroSub">-</div></div>
    <div class="s-card"><div class="lbl" id="lbl-ytd-rate" data-ko="YTD 달성률" data-es="Cumplim. YTD">YTD 달성률</div><div class="val" id="kYtd">-</div><div class="sub2" id="kYtdSub">-</div></div>
    <div class="s-card"><div class="lbl" id="lbl-annual-rate" data-ko="연간 대비 달성률" data-es="Cumplim. Anual">연간 대비 달성률</div><div class="val" id="kAnnual">-</div><div class="sub2" id="kAnnualSub">-</div></div>
  </div>
  <div class="inner" style="margin-bottom:4px;">
    <div style="font-size:10px;color:var(--hint);margin-bottom:8px;" id="lbl-monthly" data-ko="월별 달성률" data-es="Cumplimiento Mensual">월별 달성률</div>
    <div class="month-grid" id="monthBars"><div style="font-size:11px;color:var(--hint);grid-column:1/-1;text-align:center;padding:16px;">로드 중...</div></div>
  </div>

  <hr>

  <!-- 알림 + AR -->
  <div class="grid2">
    <div>
      <div class="sec" style="margin-top:0;" id="sec-alert"><span data-ko="🚨 긴급 알림" data-es="🚨 Alertas">🚨 긴급 알림</span></div>
      <div class="alerts" id="alertsList"><div style="font-size:12px;color:var(--hint);">로드 중...</div></div>
    </div>
    <div>
      <div class="sec" style="margin-top:0;" id="sec-ar"><span data-ko="💰 AR 미수금" data-es="💰 CxC Pendiente">💰 AR 미수금</span></div>
      <div class="grid3">
        <div class="card"><div class="lbl" data-ko="USD" data-es="USD">USD</div><div class="val" id="arUsd">-</div><div class="sub" id="arUsdSub">-</div></div>
        <div class="card"><div class="lbl" data-ko="MXN" data-es="MXN">MXN</div><div class="val" id="arMxn">-</div><div class="sub" id="arMxnSub">-</div></div>
        <div class="card"><div class="lbl" data-ko="총 건수" data-es="Total">총 건수</div><div class="val" id="arCnt">-</div><div class="sub">PENDIENTE</div></div>
      </div>
    </div>
  </div>

  <hr>

  <!-- CRM -->
  <div class="grid2">
    <div>
      <div class="sec" style="margin-top:0;" id="sec-crm"><span data-ko="🤝 CRM 파이프라인" data-es="🤝 Pipeline CRM">🤝 CRM 파이프라인</span></div>
      <div class="inner"><div id="pipeRows"><div style="font-size:12px;color:var(--hint);">로드 중...</div></div></div>
    </div>
    <div>
      <div class="sec" style="margin-top:0;" id="sec-action"><span data-ko="📅 이번 주 액션" data-es="📅 Acciones Semana">📅 이번 주 액션</span></div>
      <div class="inner"><div id="actionRows"><div style="font-size:12px;color:var(--hint);">로드 중...</div></div></div>
    </div>
  </div>

  <hr>

  <!-- 재고 -->
  <div class="grid2">
    <div>
      <div class="sec" style="margin-top:0;" id="sec-mty-inv"><span data-ko="📦 MTY 재고 — 재주문 필요" data-es="📦 MTY Inventario — Reorden">📦 MTY 재고 — 재주문 필요</span></div>
      <div class="inner" id="mtyInv"><div style="font-size:12px;color:var(--hint);">로드 중...</div></div>
    </div>
    <div>
      <div class="sec" style="margin-top:0;" id="sec-qro-inv"><span data-ko="📦 QRO 재고 현황" data-es="📦 QRO Inventario">📦 QRO 현황</span></div>
      <div class="inner" id="qroInv"><div style="font-size:12px;color:var(--hint);">로드 중...</div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const BASE='https://docs.google.com/spreadsheets/d/e/2PACX-1vRfv4TFloZqAVKyJXAoGCjP5xec3MvPGjTagc1btjwQzKXvICTmREywHrT1wNSl_6JN7vA_gsY2w8kB/pub?gid={G}&single=true&output=tsv';
const GIDS={ar:'1428414690',sales:'609736586',inv_mty:'1055215705',inv_qro:'1072433103',fc_inv:'118513204'};
const sb=supabase.createClient('https://oezergrrqcinclorwvnk.supabase.co','sb_publishable_1eqTksIg-IetXykOBHf0rg_19ourTmF');

// TSV → 오브젝트 배열로 파싱
async function tsvObj(key){
  const r=await fetch(BASE.replace('{G}',GIDS[key]));
  if(!r.ok) throw new Error(key+' '+r.status);
  const text=await r.text();
  const lines=text.trim().split('\n').map(l=>l.split('\t').map(v=>v.trim()));
  const hdr=lines[0];
  const data=lines.slice(1).filter(l=>l.some(v=>v)).map(l=>{
    const obj={};
    hdr.forEach((h,i)=>obj[h]=(l[i]||''));
    return obj;
  });
  return {hdr,data};
}
// TSV → raw 배열
async function tsvRaw(key){
  const r=await fetch(BASE.replace('{G}',GIDS[key]));
  if(!r.ok) throw new Error(key+' '+r.status);
  const text=await r.text();
  const lines=text.trim().split('\n').map(l=>l.split('\t').map(v=>v.trim()));
  return {hdr:lines[0],data:lines.slice(1).filter(l=>l.some(v=>v))};
}

function toN(v){const n=parseFloat(String(v||'').replace(/,/g,''));return isNaN(n)?0:n;}
function fmtK(v){
  const n=Math.round(toN(v));
  if(!n) return '-';
  if(Math.abs(n)>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
  if(Math.abs(n)>=1000) return '$'+(n/1000).toFixed(0)+'K';
  return '$'+n.toLocaleString();
}

const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const alerts=[];

async function load(){
  const errs=[];
  let usdAr=0;


  // ===== AR =====
  try{
    // AR raw: col0=skip, col1=NO, col2=YEAR ... col10=CURRENCY, col13=TOTAL, col14=PAYMENT STATUS
    const ar=await tsvRaw('ar');
    const hdr=ar.hdr;
    // 헤더에서 컬럼 인덱스 찾기
    const CI=hdr.findIndex(h=>h.toUpperCase()==='CURRENCY');
    const TI=hdr.findIndex(h=>h.toUpperCase()==='TOTAL');
    const SI=hdr.findIndex(h=>h.toUpperCase().includes('PAYMENT'));
    // NO가 숫자인 행만
    const rows=ar.data.filter(r=>!isNaN(r[1])&&r[1]);
    const pend=rows.filter(r=>(r[SI]||r[hdr.length-6]||'').toUpperCase()==='PENDIENTE');
    const usd=Math.round(pend.filter(r=>r[CI]==='USD').reduce((s,r)=>s+toN(r[TI]),0));
    usdAr=usd;
    const mxn=Math.round(pend.filter(r=>r[CI]==='MXN').reduce((s,r)=>s+toN(r[TI]),0));
    document.getElementById('arUsd').textContent='$'+usd.toLocaleString();
    document.getElementById('arUsd').style.color=usd>100000?'var(--danger-text)':usd>0?'var(--warn-text)':'var(--text)';
    document.getElementById('arMxn').textContent=mxn>0?'$'+mxn.toLocaleString():'-';
    document.getElementById('arCnt').textContent=pend.length+'건';
    document.getElementById('arUsdSub').textContent='PENDIENTE';
    document.getElementById('arMxnSub').textContent='PENDIENTE';
    if(usd>100000) alerts.push({t:'danger',tag:'AR',txt:`USD 미수금 ${fmtK(usd)} — 주의 필요`,bdg:'긴급'});
    else if(usd>0) alerts.push({t:'warn',tag:'AR',txt:`USD 미수금 ${fmtK(usd)} (${pend.length}건)`,bdg:'확인'});
    window.parent?.postMessage({type:'tabStatus',tab:'ar',status:usd>100000?'danger':usd>0?'warn':'ok',label:usd>0?fmtK(usd):'정상'},'*');
  }catch(e){errs.push('AR:'+e.message);}

  // ===== 매출 — sales_live.html 동일 로직 =====
  try{
    const salesRes=await fetch(BASE.replace('{G}',GIDS['sales']));
    if(!salesRes.ok) throw new Error('sales '+salesRes.status);
    const salesText=await salesRes.text();
    // sales_live.html과 동일한 parseTSV
    const sLines=salesText.replace(/\r/g,'').split('\n');
    const sHdr=sLines[0].split('\t').map(h=>h.trim());
    const sRows=sLines.slice(1).filter(l=>l.trim()).map(line=>{
      const vals=line.split('\t');
      const obj={};
      sHdr.forEach((h,i)=>obj[h]=(vals[i]||'').trim());
      return obj;
    });
    // 월별 컬럼 키 유연하게 찾기
    const sKeys=Object.keys(sRows[0]||{});
    const monthKeys=MONTHS.map(m=>sKeys.find(k=>k.trim()===m||k.trim()===m.replace('월','')+'월')||m);
    // 계획 행
    const planRow=sRows.find(r=>r['COMPANY']==='계획(USD)');
    const planVals=monthKeys.map(k=>toN(planRow?.[k]||0));
    const totalPlan=planVals.reduce((s,v)=>s+v,0);
    // 거래처 행
    const clientRows=sRows.filter(r=>{
      const c=r['COMPANY']||'';
      return c&&!['계획(USD)','합계','달성률(%)','YTD','-'].includes(c);
    });
    const mtyRows=clientRows.filter(r=>r['LOC']==='MTY');
    const qroRows=clientRows.filter(r=>r['LOC']==='QRO');
    const mtyM=MONTHS.map((_,mi)=>mtyRows.reduce((s,r)=>s+toN(r[monthKeys[mi]]||0),0));
    const qroM=MONTHS.map((_,mi)=>qroRows.reduce((s,r)=>s+toN(r[monthKeys[mi]]||0),0));
    const totM=MONTHS.map((_,i)=>mtyM[i]+qroM[i]);
    // 실적 있는 마지막 달
    let curM=0;
    totM.forEach((v,i)=>{if(v>0)curM=i+1;});
    const mtyYtd=mtyM.reduce((s,v)=>s+v,0);
    const qroYtd=qroM.reduce((s,v)=>s+v,0);
    const ytdAct=totM.reduce((s,v)=>s+v,0);
    const ytdPlan=planVals.slice(0,curM).reduce((s,v)=>s+v,0);
    const ytdPct=ytdPlan>0?Math.round(ytdAct/ytdPlan*100):0;
    function fmtDollar(v){return '$'+Math.round(v).toLocaleString('en-US');}
    function rateColor(r){return r>=100?'var(--ok-text)':r>=90?'var(--warn-text)':'var(--danger-text)';}
    const annualRate=totalPlan>0?Math.round(ytdAct/totalPlan*100):0;
    document.getElementById('kPlan').textContent=fmtDollar(totalPlan);
    document.getElementById('kYtdAct').textContent=fmtDollar(ytdAct);
    document.getElementById('kYtdActSub').textContent=`1~${curM}월`;
    document.getElementById('kMty').textContent=fmtDollar(mtyYtd);
    document.getElementById('kMtySub').textContent=`비중 ${Math.round(mtyYtd/(ytdAct||1)*100)}%`;
    document.getElementById('kQro').textContent=fmtDollar(qroYtd);
    document.getElementById('kQroSub').textContent=`비중 ${Math.round(qroYtd/(ytdAct||1)*100)}%`;
    const ytdRate=ytdPlan>0?Math.round(ytdAct/ytdPlan*100):0;
    document.getElementById('kYtd').textContent=ytdRate+'%';
    document.getElementById('kYtd').style.color=rateColor(ytdRate);
    document.getElementById('kYtdSub').textContent=`${ytdRate>=100?'▲':'▼'} ${fmtDollar(Math.abs(ytdAct-ytdPlan))} ${ytdRate>=100?'초과':'미달'}`;
    document.getElementById('kAnnual').textContent=annualRate+'%';
    document.getElementById('kAnnualSub').textContent=`잔여 ${fmtDollar(Math.max(totalPlan-ytdAct,0))}`;
    // 월별 바 (curM 달까지만 표시)
    const maxV=Math.max(...totM.slice(0,curM).filter(v=>v>0),1);
    document.getElementById('monthBars').innerHTML=MONTHS.map((m,i)=>{
      const act=totM[i],plan=planVals[i]||0;
      const pct=plan>0?Math.round(act/plan*100):0;
      const isFut=act===0&&i>=curM;
      const clr=isFut?'var(--s2)':pct>=100?'var(--ok)':pct>=90?'var(--warn)':'var(--danger)';
      const pctClr=isFut?'var(--hint)':pct>=100?'var(--ok-text)':pct>=90?'var(--warn-text)':'var(--danger-text)';
      const h=isFut?0:Math.max(Math.round(act/maxV*55),act>0?3:0);
      const isCur=i===curM-1;
      return `<div class="m-col" style="${isCur?'background:var(--blue-bg);border-radius:4px;padding:2px;':''}">
        <div class="m-pct" style="color:${pctClr};">${isFut?'예정':pct+'%'}</div>
        <div class="m-track"><div class="m-fill" style="height:${h}px;background:${clr};"></div></div>
        <div class="m-lbl">${i+1}월</div>
        <div class="m-amt">${!isFut&&act>0?fmtK(act):''}</div>
      </div>`;
    }).join('');
    if(ytdRate<80) alerts.push({t:'danger',tag:'매출',txt:`YTD 달성율 ${ytdRate}% — 목표 미달`,bdg:'주의'});
    else if(ytdRate<100) alerts.push({t:'warn',tag:'매출',txt:`YTD 달성율 ${ytdRate}% — 목표 추격 중`,bdg:'확인'});
    window.parent?.postMessage({type:'tabStatus',tab:'sales',status:ytdRate>=100?'ok':ytdPct>=80?'warn':'danger',label:ytdRate+'%'},'*');
  }catch(e){errs.push('매출:'+e.message);}

  // ===== 재고 =====
  try{
    const fcData=await tsvRaw('fc_inv');
    const fcMap={};
    fcData.data.forEach(r=>{if(r[1])fcMap[r[1].toLowerCase().replace(/\s+/g,'')]=toN(r[3]);});
    const getFC=item=>fcMap[(item||'').toLowerCase().replace(/\s+/g,'')]||0;
    const mtyInv=await tsvRaw('inv_mty');
    const mtyItems=mtyInv.data.filter(r=>r[2]&&r[2].trim()).map(r=>({item:r[2],stock:toN(r[5]),fc:getFC(r[2])}));
    const reorders=mtyItems.filter(r=>r.fc>0&&r.stock/r.fc<3);
    const warns=mtyItems.filter(r=>r.fc>0&&r.stock/r.fc>=3&&r.stock/r.fc<6);
    document.getElementById('mtyInv').innerHTML=[
      ...reorders.map(r=>`<div class="inv-row"><span>${r.item}</span><span class="moh-pill moh-d">MOH ${(r.stock/r.fc).toFixed(1)}</span></div>`),
      ...warns.map(r=>`<div class="inv-row"><span>${r.item}</span><span class="moh-pill moh-w">MOH ${(r.stock/r.fc).toFixed(1)}</span></div>`)
    ].join('')||'<div style="font-size:12px;color:var(--ok-text);">✓ 전체 정상</div>';
    if(reorders.length>0) alerts.push({t:'danger',tag:'재고',txt:`MTY 재주문 필요 ${reorders.length}건 — MOH 3개월 미만`,bdg:`${reorders.length}건`});
    window.parent?.postMessage({type:'tabStatus',tab:'inv',status:reorders.length>0?'danger':warns.length>0?'warn':'ok',label:reorders.length>0?`재주문 ${reorders.length}건`:warns.length>0?`주의 ${warns.length}건`:'정상'},'*');
    const qroInv=await tsvRaw('inv_qro');
    document.getElementById('qroInv').innerHTML=qroInv.data.filter(r=>r[2]&&r[2].trim()).map(r=>{
      const fc=getFC(r[2]),stock=toN(r[5]),moh=fc>0?(stock/fc).toFixed(1):'-';
      const cls=moh!=='-'&&parseFloat(moh)<2?'moh-d':moh!=='-'&&parseFloat(moh)<4?'moh-w':'';
      return `<div class="inv-row"><span>${r[2]}</span><span class="moh-pill ${cls}">MOH ${moh}</span></div>`;
    }).join('')||'<div style="font-size:12px;color:var(--hint);">데이터 없음</div>';
  }catch(e){errs.push('재고:'+e.message);}

  // ===== CRM =====
  try{
    const {data:accs}=await sb.from('accounts').select('*').order('name');
    const {data:logs}=await sb.from('contact_logs').select('*').order('created_at',{ascending:false});
    const logMap={};
    (logs||[]).forEach(l=>{if(!logMap[l.account_id])logMap[l.account_id]=[];logMap[l.account_id].push(l);});
    const stages=[
      {id:'active',lbl:'Active',clr:'var(--ok)'},
      {id:'prospect',lbl:'Prospect',clr:'var(--s2)'},
      {id:'qualified',lbl:'Qualified',clr:'var(--blue)'},
      {id:'proposal',lbl:'Proposal',clr:'var(--purple)'},
      {id:'negotiation',lbl:'Negotiation',clr:'var(--warn)'},
    ];
    const maxC=Math.max(...stages.map(s=>(accs||[]).filter(a=>a.stage===s.id).length),1);
    document.getElementById('pipeRows').innerHTML=stages.map(s=>{
      const cnt=(accs||[]).filter(a=>a.stage===s.id).length;
      const val=(accs||[]).filter(a=>a.stage===s.id).reduce((ss,a)=>ss+(a.expected_value||0),0);
      return `<div class="pipe">
        <span class="pipe-lbl">${s.lbl}</span>
        <div class="pipe-tr"><div class="pipe-fill" style="width:${Math.round(cnt/maxC*100)}%;background:${s.clr};"></div></div>
        <span class="pipe-val">${cnt}개사${val?` · $${(val/1000).toFixed(0)}K`:''}</span>
      </div>`;
    }).join('');
    const now=Date.now();
    const actions=(accs||[]).filter(a=>a.next_action&&a.next_action_date&&a.stage!=='won'&&a.stage!=='lost')
      .map(a=>({...a,days:Math.ceil((new Date(a.next_action_date)-now)/86400000)}))
      .sort((a,b)=>a.days-b.days).slice(0,5);
    document.getElementById('actionRows').innerHTML=actions.length
      ?actions.map(a=>{
        const cls=a.days<0?'d-over':a.days<=3?'d-soon':'d-ok';
        const txt=a.days<0?`D+${Math.abs(a.days)}`:a.days===0?'오늘':`D-${a.days}`;
        return `<div class="action"><span class="d-pill ${cls}">${txt}</span><div><div style="font-weight:500;">${a.name}</div><div style="font-size:10px;color:var(--muted);">${a.next_action}</div></div></div>`;
      }).join('')
      :'<div style="font-size:12px;color:var(--hint);">예정 액션 없음</div>';
    const followup=(accs||[]).filter(a=>{
      if(a.stage==='won'||a.stage==='lost')return false;
      const lg=logMap[a.id]||[];
      const d=lg.length>0?Math.floor((Date.now()-new Date(lg[0].created_at))/86400000):999;
      return d>30;
    });
    if(followup.length>0) alerts.push({t:'warn',tag:'CRM',txt:`팔로업 필요 ${followup.length}개사 — 30일 이상 컨택 없음`,bdg:`${followup.length}건`});
    window.parent?.postMessage({type:'tabStatus',tab:'crm',status:followup.length>0?'warn':'ok',label:followup.length>0?`팔로업 ${followup.length}건`:'정상'},'*');
  }catch(e){errs.push('CRM:'+e.message);}

  // 알림 렌더
  const clrMap={danger:'al-d',warn:'al-w',info:'al-b'};
  const tagMap={danger:'tag-d',warn:'tag-w',info:'tag-b'};
  document.getElementById('alertsList').innerHTML=alerts.length
    ?alerts.map(a=>`<div class="al ${clrMap[a.t]||'al-b'}">
        <span class="tag ${tagMap[a.t]||'tag-b'}">${a.tag}</span>
        <span class="txt">${a.txt}</span>
        <span class="bdg">${a.bdg}</span>
      </div>`).join('')
    :'<div style="font-size:12px;color:var(--ok-text);padding:8px 0;">✓ 전체 정상</div>';

  // 탭 상태 배지 업데이트
  try{ window._mexcorSetStatus?.('ar', usdAr>100000?'danger':usdAr>0?'warn':'ok', usdAr>0?'$'+Math.round(usdAr/1000)+'K':'정상'); }catch(e){}
  document.getElementById('sbar').className = errs.length?'sbar err':'sbar ok';
  document.getElementById('sbar').textContent = errs.length?'⚠ 오류: '+errs.join(' / '):'✓ 데이터 연동 성공';
  document.getElementById('pageTs').textContent='최종 업데이트: '+new Date().toLocaleString('ko-KR');
}
load();

// 언어 변경 수신
const LANG_KO={
  'lbl-plan':'연간 계획','lbl-ytd-act':'YTD 실적','lbl-ytd-rate':'YTD 달성률',
  'lbl-annual-rate':'연간 대비 달성률','lbl-monthly':'월별 달성률',
  'sec-sales':'📊 매출 현황','sec-alert':'🚨 긴급 알림','sec-ar':'💰 AR 미수금',
  'sec-crm':'🤝 CRM 파이프라인','sec-action':'📅 이번 주 액션',
  'sec-mty-inv':'📦 MTY 재고 — 재주문 필요','sec-qro-inv':'📦 QRO 재고 현황'
};
const LANG_ES={
  'lbl-plan':'Plan Anual','lbl-ytd-act':'Real YTD','lbl-ytd-rate':'Cumplimiento YTD',
  'lbl-annual-rate':'Cumplimiento Anual','lbl-monthly':'Cumplimiento Mensual',
  'sec-sales':'📊 Ventas','sec-alert':'🚨 Alertas Urgentes','sec-ar':'💰 Cuentas por Cobrar',
  'sec-crm':'🤝 Pipeline CRM','sec-action':'📅 Acciones esta Semana',
  'sec-mty-inv':'📦 MTY Inventario — Reorden','sec-qro-inv':'📦 QRO Inventario'
};
window.addEventListener('message',function(e){
  if(e.data?.type!=='langChange') return;
  const L=e.data.lang==='es'?LANG_ES:LANG_KO;
  Object.entries(L).forEach(([id,txt])=>{
    const el=document.getElementById(id);
    if(el) el.textContent=txt;
  });
  document.querySelectorAll('.sec').forEach(el=>{
    const id=el.id;
    if(id&&L[id]) el.textContent=L[id];
  });
});
</script>
